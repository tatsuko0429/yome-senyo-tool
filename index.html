<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#8f413b" />
    <meta name="application-name" content="たつこをミマモルメ" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="たつこをミマモルメ" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png" />
    <link rel="shortcut icon" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <title>たつこをミマモルメ</title>
    <style>
:root {
  --bg: #f4ece6;
  --bg-soft: #fff8f1;
  --surface: rgba(255, 250, 245, 0.9);
  --surface-strong: #fffdfb;
  --line: rgba(139, 92, 72, 0.18);
  --ink: #261816;
  --ink-soft: #6f5751;
  --accent: #96433d;
  --accent-strong: #78312c;
  --accent-soft: #edd2cb;
  --accent-pale: #f8ece8;
  --gold: #b6894b;
  --shadow-strong: 0 24px 60px rgba(63, 33, 22, 0.16);
  --shadow-soft: 0 12px 28px rgba(63, 33, 22, 0.1);
  --radius-xl: 32px;
  --radius-lg: 24px;
  --radius-md: 18px;
  --radius-sm: 14px;
  --font-display: "BIZ UDPMincho", "Yu Mincho", "Hiragino Mincho ProN", serif;
  --font-body: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

[hidden] {
  display: none !important;
}

html {
  color-scheme: light;
  background: linear-gradient(180deg, #f8f0e9 0%, #f1e5db 100%);
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: var(--font-body);
  color: var(--ink);
  background:
    radial-gradient(circle at top left, rgba(182, 137, 75, 0.14), transparent 28%),
    radial-gradient(circle at right 12% top 14%, rgba(150, 67, 61, 0.14), transparent 24%),
    linear-gradient(180deg, #f8f0e9 0%, #efe2d8 100%);
}

body.auth-locked {
  overflow: hidden;
}

button,
input {
  font: inherit;
}

button {
  cursor: pointer;
}

.noscript-message {
  margin: 24px auto;
  width: min(92vw, 420px);
  padding: 16px 18px;
  border-radius: var(--radius-md);
  background: var(--surface-strong);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-soft);
  text-align: center;
}

.app-backdrop {
  position: fixed;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}

.app-backdrop__glow {
  position: absolute;
  border-radius: 999px;
  filter: blur(16px);
  opacity: 0.7;
}

.app-backdrop__glow--left {
  width: 220px;
  height: 220px;
  left: -48px;
  top: 84px;
  background: rgba(182, 137, 75, 0.16);
}

.app-backdrop__glow--right {
  width: 240px;
  height: 240px;
  right: -72px;
  top: 26%;
  background: rgba(150, 67, 61, 0.12);
}

.auth-gate {
  position: fixed;
  inset: 0;
  z-index: 70;
  display: grid;
  place-items: center;
  padding: 22px;
}

.auth-gate__backdrop {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at top, rgba(182, 137, 75, 0.18), transparent 24%),
    linear-gradient(180deg, rgba(251, 242, 235, 0.96), rgba(239, 226, 216, 0.98));
}

.auth-card {
  position: relative;
  width: min(100%, 420px);
  padding: 28px 22px 24px;
  border-radius: 32px;
  border: 1px solid rgba(255, 255, 255, 0.82);
  background:
    linear-gradient(180deg, rgba(255, 252, 248, 0.94), rgba(248, 236, 227, 0.92));
  box-shadow: 0 28px 70px rgba(46, 23, 16, 0.18);
  text-align: center;
}

.auth-card__title {
  margin: 0;
  font-family: var(--font-display);
  font-size: 1.55rem;
  line-height: 1.55;
}

.auth-card__text {
  margin: 14px 0 0;
  color: var(--ink-soft);
  line-height: 1.8;
}

.auth-display {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  margin: 20px 0 12px;
}

.auth-slot {
  min-height: 58px;
  display: grid;
  place-items: center;
  border-radius: 18px;
  border: 1px solid rgba(150, 67, 61, 0.16);
  background: rgba(255, 255, 255, 0.78);
  color: var(--accent);
  font-size: 1.4rem;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82);
}

.auth-slot--filled {
  border-color: rgba(150, 67, 61, 0.28);
  background: rgba(255, 248, 243, 0.94);
}

.auth-error {
  margin: 0 0 12px;
  color: #c14942;
  font-size: 0.88rem;
  font-weight: 700;
}

.auth-keypad {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}

.auth-key {
  min-height: 58px;
  border-radius: 20px;
  border: 1px solid rgba(150, 67, 61, 0.12);
  background: rgba(255, 255, 255, 0.82);
  color: var(--ink);
  font-size: 1.15rem;
  font-weight: 700;
  box-shadow: var(--shadow-soft);
}

.auth-key--sub {
  font-size: 0.92rem;
}

.app-shell {
  position: relative;
  width: min(100%, 460px);
  min-height: 100vh;
  margin: 0 auto;
  padding: max(20px, env(safe-area-inset-top)) 18px
    calc(106px + env(safe-area-inset-bottom));
}

.topbar {
  margin-bottom: 12px;
}

.topbar-grid {
  display: grid;
  justify-items: center;
  gap: 4px;
  width: 100%;
}

.brand-block {
  min-width: 0;
  display: grid;
  justify-items: center;
  gap: 4px;
  text-align: center;
}

.brand-block--single {
  width: 100%;
}

.topbar-meta {
  margin: 0;
  color: var(--ink-soft);
  font-size: 0.7rem;
  line-height: 1.35;
  white-space: nowrap;
}

.eyebrow {
  margin: 0 0 6px;
  color: var(--accent);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.brand-title,
.section-title,
.calendar-month-title,
.modal-title {
  margin: 0;
  font-family: var(--font-display);
  letter-spacing: 0.04em;
}

.brand-title {
  max-width: 100%;
  font-size: clamp(1.48rem, 5.4vw, 1.92rem);
  line-height: 1.16;
  white-space: nowrap;
  text-wrap: nowrap;
}

.brand-subtitle,
.support-text,
.calendar-hint,
.status-pill__label,
.status-pill__value,
.modal-meta,
.modal-kicker {
  color: var(--ink-soft);
}

.brand-subtitle {
  margin: 10px auto 0;
  max-width: 24rem;
  font-size: 0.95rem;
  line-height: 1.6;
}

.album-chip,
.primary-button,
.ghost-button,
.toggle-button,
.icon-button,
.nav-button,
.shortcut-card,
.modal-close,
.topic-card,
.notice-card,
.month-header {
  transition:
    transform 180ms ease,
    box-shadow 180ms ease,
    background-color 180ms ease,
    border-color 180ms ease,
    opacity 180ms ease,
    filter 180ms ease;
}

.pressable {
  position: relative;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition:
    transform 180ms ease,
    box-shadow 180ms ease,
    background-color 180ms ease,
    border-color 180ms ease,
    opacity 180ms ease,
    filter 180ms ease;
}

.pressable::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background:
    radial-gradient(
      circle at var(--press-x, 50%) var(--press-y, 50%),
      rgba(255, 255, 255, 0.48),
      rgba(255, 255, 255, 0.16) 32%,
      transparent 66%
    );
  opacity: 0;
  transform: scale(0.92);
  transition:
    opacity 170ms ease,
    transform 220ms ease;
  pointer-events: none;
}

.pressable:active,
.pressable.is-held {
  filter: brightness(0.985) saturate(1.04);
  transform: translateY(2px) scale(0.972);
}

.pressable.is-tap-flash::after {
  opacity: 1;
  transform: scale(1);
}

.calendar-cell.pressable::after {
  display: none;
}

.album-chip,
.primary-button,
.icon-button,
.nav-button,
.ghost-button,
.toggle-button {
  min-height: 46px;
  border-radius: 999px;
  border: 1px solid transparent;
}

.album-chip,
.primary-button {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
  color: #fffaf7;
  box-shadow: 0 16px 26px rgba(120, 49, 44, 0.24);
}

.album-chip {
  padding: 0 18px;
  flex: 0 0 auto;
}

.status-strip {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin: 10px 0 16px;
}

.status-pill {
  padding: 10px 12px;
  border-radius: var(--radius-md);
  background: rgba(255, 252, 248, 0.76);
  border: 1px solid rgba(255, 255, 255, 0.72);
  box-shadow: var(--shadow-soft);
  backdrop-filter: blur(14px);
  text-align: center;
}

.status-pill--button {
  width: 100%;
  border: 1px solid rgba(150, 67, 61, 0.12);
}

.status-pill--album {
  text-align: center;
  background:
    linear-gradient(180deg, rgba(255, 247, 236, 0.98), rgba(246, 236, 220, 0.94));
  border-color: rgba(182, 137, 75, 0.2);
}

.status-pill--album .status-pill__value {
  color: #8a5c19;
}

.status-pill--unread {
  background:
    linear-gradient(180deg, rgba(244, 248, 255, 0.96), rgba(233, 241, 253, 0.92));
  border-color: rgba(83, 118, 171, 0.16);
}

.status-pill--alert {
  background:
    linear-gradient(180deg, rgba(255, 244, 242, 0.96), rgba(251, 229, 226, 0.9));
  border-color: rgba(201, 73, 66, 0.22);
  box-shadow:
    0 14px 24px rgba(201, 73, 66, 0.16),
    0 0 0 6px rgba(201, 73, 66, 0.06);
}

.status-pill__label {
  display: block;
  font-size: 0.76rem;
  margin-bottom: 5px;
}

.status-pill__value {
  display: block;
  color: var(--ink);
  font-size: 0.95rem;
  font-weight: 700;
  line-height: 1.35;
}

.status-pill__value--alert {
  color: #c14942;
}

.status-pill__hint {
  display: block;
  margin-top: 4px;
  color: var(--ink-soft);
  font-size: 0.74rem;
  line-height: 1.4;
}

.panel-host {
  position: relative;
}

.panel {
  animation: panel-enter 260ms ease;
}

.panel[hidden] {
  display: none;
}

@keyframes panel-enter {
  from {
    opacity: 0;
    transform: translateY(10px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.hero-card,
.pinned-card,
.filter-card,
.calendar-shell,
.notice-month,
.topic-card,
.notice-card,
.shortcut-card {
  border: 1px solid rgba(255, 255, 255, 0.78);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(255, 250, 245, 0.82));
  box-shadow: var(--shadow-soft);
  backdrop-filter: blur(16px);
}

.hero-card,
.pinned-card,
.filter-card,
.calendar-shell,
.notice-month {
  border-radius: var(--radius-xl);
  padding: 20px;
}

.section-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}

.section-head--stack {
  display: grid;
  gap: 8px;
}

.section-title {
  font-size: 1.34rem;
}

.ghost-button,
.toggle-button,
.icon-button,
.modal-close {
  background: rgba(255, 249, 244, 0.8);
  color: var(--accent-strong);
  border-color: rgba(150, 67, 61, 0.16);
}

.ghost-button,
.toggle-button,
.icon-button {
  padding: 0 16px;
}

.ghost-button--compact {
  min-height: 40px;
  padding: 0 14px;
}

.hero-card {
  position: relative;
  overflow: hidden;
}

.hero-card--topic {
  background:
    linear-gradient(180deg, rgba(255, 250, 244, 0.92), rgba(252, 242, 233, 0.88));
  border-color: rgba(190, 149, 92, 0.18);
}

.hero-card::before,
.pinned-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(120deg, rgba(182, 137, 75, 0.12), transparent 44%),
    linear-gradient(335deg, rgba(150, 67, 61, 0.12), transparent 40%);
  pointer-events: none;
}

.topic-grid {
  display: grid;
  gap: 12px;
}

.topic-card,
.shortcut-card,
.notice-card {
  width: 100%;
  border-radius: var(--radius-lg);
  padding: 16px;
  text-align: left;
  border: 1px solid var(--line);
}

.topic-card {
  background: linear-gradient(180deg, rgba(253, 246, 240, 0.92), rgba(248, 237, 231, 0.96));
}

.topic-card--today {
  border-color: rgba(187, 106, 86, 0.18);
  background:
    linear-gradient(180deg, rgba(255, 246, 241, 0.96), rgba(250, 234, 226, 0.98));
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.62);
}

.topic-card--tomorrow {
  border-color: rgba(109, 139, 156, 0.18);
  background:
    linear-gradient(180deg, rgba(245, 250, 252, 0.96), rgba(232, 241, 246, 0.98));
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.64);
}

.topic-card__label,
.shortcut-card__label {
  display: block;
  color: var(--accent);
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.08em;
}

.topic-card--today .topic-card__label {
  color: #b25f4b;
}

.topic-card--tomorrow .topic-card__label {
  color: #57788a;
}

.topic-card--today .topic-card__summary {
  color: rgba(94, 62, 54, 0.88);
}

.topic-card--tomorrow .topic-card__summary {
  color: rgba(67, 87, 98, 0.88);
}

.topic-card__title {
  margin: 12px 0 10px;
  font-size: 1.08rem;
  font-weight: 700;
  color: var(--ink);
}

.topic-card__summary,
.shortcut-card__meta,
.notice-card__snippet,
.month-summary,
.calendar-count,
.empty-text {
  margin: 0;
  color: var(--ink-soft);
  line-height: 1.6;
}

.topic-card__meta,
.shortcut-card__value,
.notice-card__meta,
.notice-card__status,
.calendar-event__time,
.calendar-cell__count,
.modal-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(150, 67, 61, 0.08);
  color: var(--accent-strong);
  font-size: 0.78rem;
  font-weight: 700;
}

.topic-card__footer {
  margin-top: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.pinned-card {
  margin-top: 16px;
  position: relative;
  overflow: hidden;
}

.pinned-card--saved {
  background:
    linear-gradient(180deg, rgba(246, 250, 245, 0.92), rgba(235, 244, 240, 0.88));
  border-color: rgba(110, 141, 126, 0.18);
}

.pinned-empty-state {
  min-height: 6px;
}

.pinned-notice-list {
  display: grid;
  gap: 12px;
}

.shortcut-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.shortcut-card {
  background: linear-gradient(180deg, rgba(255, 252, 248, 0.96), rgba(249, 238, 230, 0.94));
}

.shortcut-card__value {
  margin-top: 12px;
  margin-bottom: 10px;
}

.home-notice-list {
  display: grid;
  gap: 12px;
}

.home-notice-list .notice-card {
  background: rgba(255, 255, 255, 0.72);
}

.primary-button {
  width: 100%;
  padding: 0 18px;
  font-weight: 700;
}

.field-label {
  display: block;
  margin-bottom: 10px;
  color: var(--ink);
  font-size: 0.92rem;
  font-weight: 700;
}

.notice-board {
  --notice-accent: #96433d;
  --notice-accent-icon: rgba(150, 67, 61, 0.5);
  --notice-accent-soft: rgba(237, 210, 203, 0.46);
  --notice-accent-border: rgba(150, 67, 61, 0.14);
  --notice-accent-strong: rgba(150, 67, 61, 0.3);
  --notice-accent-glow: rgba(150, 67, 61, 0.08);
  --notice-search-bg:
    linear-gradient(180deg, rgba(255, 249, 244, 0.92), rgba(251, 241, 235, 0.88));
  --notice-month-bg:
    linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(255, 250, 245, 0.82));
  display: grid;
  gap: 14px;
}

.notice-board[data-source-theme="papa"] {
  --notice-accent: #96433d;
  --notice-accent-icon: rgba(150, 67, 61, 0.5);
  --notice-accent-soft: rgba(237, 210, 203, 0.46);
  --notice-accent-border: rgba(150, 67, 61, 0.14);
  --notice-accent-strong: rgba(150, 67, 61, 0.3);
  --notice-accent-glow: rgba(150, 67, 61, 0.08);
  --notice-search-bg:
    linear-gradient(180deg, rgba(255, 247, 243, 0.94), rgba(251, 238, 234, 0.9));
  --notice-month-bg:
    linear-gradient(180deg, rgba(255, 253, 251, 0.9), rgba(255, 246, 241, 0.84));
}

.notice-board[data-source-theme="company"] {
  --notice-accent: #597492;
  --notice-accent-icon: rgba(89, 116, 146, 0.5);
  --notice-accent-soft: rgba(213, 224, 239, 0.52);
  --notice-accent-border: rgba(89, 116, 146, 0.16);
  --notice-accent-strong: rgba(89, 116, 146, 0.3);
  --notice-accent-glow: rgba(89, 116, 146, 0.08);
  --notice-search-bg:
    linear-gradient(180deg, rgba(245, 248, 253, 0.94), rgba(234, 240, 249, 0.9));
  --notice-month-bg:
    linear-gradient(180deg, rgba(251, 253, 255, 0.9), rgba(241, 246, 252, 0.84));
}

.notice-source-tabs {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  padding: 6px;
  border-radius: 24px;
  background: var(--notice-accent-soft);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
}

.notice-source-tab {
  min-height: 62px;
  display: grid;
  justify-items: center;
  gap: 4px;
  padding: 10px 8px;
  border: 1px solid rgba(150, 67, 61, 0.1);
  border-radius: 18px;
  background: rgba(255, 250, 246, 0.78);
  color: var(--ink-soft);
}

.notice-source-tab__dot {
  width: 9px;
  height: 9px;
  border-radius: 999px;
  background: rgba(150, 67, 61, 0.4);
}

.notice-source-tab[data-notice-source="papa"] .notice-source-tab__dot {
  background: rgba(150, 67, 61, 0.4);
}

.notice-source-tab[data-notice-source="company"] .notice-source-tab__dot {
  background: rgba(89, 116, 146, 0.46);
}

.notice-source-tab[data-notice-source="papa"].notice-source-tab--active {
  background: linear-gradient(180deg, rgba(225, 145, 145, 0.9), rgba(204, 120, 120, 0.9));
  color: #fff9f6;
  box-shadow: 0 12px 22px rgba(150, 67, 61, 0.18);
}

.notice-source-tab[data-notice-source="company"].notice-source-tab--active {
  background: linear-gradient(180deg, rgba(129, 156, 188, 0.92), rgba(91, 118, 148, 0.92));
  color: #f8fbff;
  box-shadow: 0 12px 22px rgba(89, 116, 146, 0.18);
}

.notice-source-tab--active .notice-source-tab__dot {
  background: rgba(255, 255, 255, 0.9);
}

.notice-source-tab__label {
  font-size: 0.95rem;
  font-weight: 700;
}

.notice-source-tab__count {
  font-size: 0.76rem;
  opacity: 0.92;
}

.notice-search-card {
  padding: 12px 14px;
  border-radius: var(--radius-xl);
  border: 1px solid rgba(255, 255, 255, 0.82);
  background: var(--notice-search-bg);
  box-shadow: var(--shadow-soft);
}

.search-field {
  display: flex;
  align-items: center;
  gap: 12px;
  min-height: 44px;
  padding: 0 14px;
  border-radius: 18px;
  border: 1px solid var(--notice-accent-border);
  background: rgba(255, 255, 255, 0.88);
}

.search-field:focus-within {
  border-color: var(--notice-accent-strong);
  box-shadow: 0 0 0 4px var(--notice-accent-glow);
}

.search-field__icon {
  position: relative;
  width: 16px;
  height: 16px;
  border: 2px solid var(--notice-accent-icon);
  border-radius: 999px;
  flex: 0 0 auto;
}

.search-field__icon::after {
  content: "";
  position: absolute;
  right: -4px;
  bottom: -4px;
  width: 7px;
  height: 2px;
  border-radius: 999px;
  background: var(--notice-accent-icon);
  transform: rotate(45deg);
  transform-origin: center;
}

.notice-board .empty-card {
  background: var(--notice-month-bg);
  border-color: var(--notice-accent-border);
}

.search-input {
  width: 100%;
  min-height: 46px;
  border-radius: 18px;
  border: 1px solid rgba(150, 67, 61, 0.16);
  background: rgba(255, 255, 255, 0.86);
  padding: 0 16px;
  color: var(--ink);
}

.search-input--embedded {
  min-height: 44px;
  padding: 0;
  border: 0;
  background: transparent;
}

.search-input:focus-visible {
  outline: 2px solid rgba(150, 67, 61, 0.28);
  outline-offset: 2px;
}

.search-input--embedded:focus-visible {
  outline: none;
}

.notice-months {
  display: grid;
  gap: 12px;
}

.notice-month {
  padding: 14px;
  background: var(--notice-month-bg);
}

.month-header {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 14px;
  padding: 12px 10px;
  border: 0;
  background: transparent;
  border-radius: var(--radius-md);
  text-align: left;
}

.month-header[aria-expanded="true"] {
  background: rgba(255, 248, 241, 0.68);
}

.month-header__title {
  margin: 0;
  font-family: var(--font-display);
  font-size: 1.1rem;
}

.month-header__count {
  font-size: 0.84rem;
  color: var(--ink-soft);
}

.month-header__mark {
  color: var(--notice-accent);
  font-size: 1rem;
  font-weight: 700;
}

.month-body {
  display: grid;
  gap: 0;
  padding-top: 6px;
}

.notice-card__row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.notice-card__title {
  margin: 0 0 10px;
  color: var(--ink);
  font-size: 1rem;
  font-weight: 700;
  line-height: 1.6;
}

.notice-card__snippet {
  text-align: left;
}

.notice-card__meta-group {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.notice-card__status--unread {
  background: rgba(150, 67, 61, 0.14);
}

.notice-card__status--read {
  background: rgba(111, 87, 81, 0.12);
  color: var(--ink-soft);
}

.notice-card__status--important {
  background: rgba(182, 137, 75, 0.16);
  color: #8a5c19;
}

.notice-source-chip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 28px;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 0.74rem;
  font-weight: 700;
  letter-spacing: 0.04em;
}

.notice-source-chip--papa {
  background: rgba(150, 67, 61, 0.1);
  color: var(--accent-strong);
}

.notice-source-chip--company {
  background: rgba(182, 137, 75, 0.14);
  color: #8a5c19;
}

.notice-list-card {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: stretch;
  gap: 12px;
  border: 0;
  border-bottom: 1px solid rgba(150, 67, 61, 0.1);
  border-radius: 0;
  background: transparent;
  box-shadow: none;
}

.notice-list-card:last-child {
  border-bottom: 0;
}

.notice-list-card__open {
  width: 100%;
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  align-items: center;
  gap: 12px;
  padding: 16px 0;
  border: 0;
  background: transparent;
  text-align: left;
}

.notice-list-card__dot {
  width: 10px;
  height: 10px;
  border-radius: 999px;
  background: var(--notice-accent-border);
}

.notice-list-card__dot--unread {
  background: var(--notice-accent);
  box-shadow: 0 0 0 5px var(--notice-accent-glow);
}

.notice-list-card__body {
  min-width: 0;
}

.notice-list-card__meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

.notice-list-card__title {
  margin: 0 0 8px;
  color: var(--ink);
  font-size: 1.02rem;
  font-weight: 700;
  line-height: 1.55;
}

.notice-list-card__snippet {
  margin: 0;
  color: var(--ink-soft);
  font-size: 0.92rem;
  line-height: 1.6;
  text-align: left;
}

.notice-list-card__avatar {
  width: 46px;
  height: 46px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  color: #fff8f5;
  font-size: 0.95rem;
  font-weight: 700;
  box-shadow: 0 10px 18px rgba(63, 33, 22, 0.12);
}

.notice-list-card__avatar--papa {
  background: linear-gradient(135deg, #b66a63, #94413b);
}

.notice-list-card__avatar--company {
  background: linear-gradient(135deg, #c7a25f, #a87833);
}

.pin-button {
  align-self: center;
  min-width: 42px;
  width: 42px;
  min-height: 42px;
  padding: 0;
  border-radius: 999px;
  border: 1px solid rgba(150, 67, 61, 0.18);
  background: rgba(255, 248, 242, 0.92);
  color: var(--accent-strong);
  font-size: 1rem;
  font-weight: 700;
}

.pin-button--active {
  background: linear-gradient(135deg, #b6894b, #996428);
  color: #fffaf6;
  box-shadow: 0 10px 18px rgba(153, 100, 40, 0.18);
}

.empty-card {
  padding: 24px 18px;
  border-radius: var(--radius-lg);
  border: 1px dashed rgba(150, 67, 61, 0.22);
  text-align: center;
}

.empty-card .section-title {
  font-size: 1.05rem;
  margin-bottom: 10px;
}

.calendar-shell {
  position: relative;
  overflow: hidden;
  padding: 14px 6px 14px;
  background:
    linear-gradient(180deg, rgba(255, 251, 247, 0.96), rgba(245, 234, 226, 0.98));
  border: 1px solid rgba(255, 255, 255, 0.8);
  box-shadow: var(--shadow-soft);
  color: var(--ink);
}

.panel[data-panel="calendar"] {
  margin-inline: -14px;
}

.calendar-shell::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at top left, rgba(182, 137, 75, 0.14), transparent 34%),
    radial-gradient(circle at right 12% top 18%, rgba(150, 67, 61, 0.12), transparent 28%);
  pointer-events: none;
}

.calendar-topbar {
  display: flex;
  justify-content: center;
  position: relative;
  z-index: 1;
  margin-bottom: 10px;
}

.calendar-view-switch {
  display: inline-grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 4px;
  padding: 4px;
  border-radius: 999px;
  background: rgba(255, 249, 244, 0.88);
  border: 1px solid rgba(150, 67, 61, 0.12);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82);
}

.calendar-view-button {
  min-height: 38px;
  padding: 0 16px;
  border: 0;
  border-radius: 999px;
  background: transparent;
  color: var(--ink-soft);
  font-size: 0.88rem;
  font-weight: 700;
}

.calendar-view-button--active {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
  color: #fffaf7;
  box-shadow: 0 12px 22px rgba(120, 49, 44, 0.18);
}

.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
  position: relative;
  z-index: 1;
}

.calendar-shell .icon-button {
  min-width: 64px;
  background: rgba(255, 249, 244, 0.84);
  color: var(--accent-strong);
  border-color: rgba(150, 67, 61, 0.14);
}

.calendar-shell .icon-button:disabled {
  opacity: 0.42;
  cursor: default;
  box-shadow: none;
}

.calendar-mode-label {
  margin: 0 0 4px;
  color: rgba(150, 67, 61, 0.74);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.08em;
}

.calendar-title-block {
  flex: 1 1 auto;
  text-align: center;
}

.calendar-month-title {
  font-size: 1.42rem;
  color: var(--ink);
}

.calendar-month-view,
.calendar-week-view {
  display: grid;
  gap: 10px;
  position: relative;
  z-index: 1;
}

.weekday-row {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 3px;
}

.calendar-grid {
  display: grid;
  --calendar-grid-gap: 3px;
  --calendar-cell-padding-top: 3px;
  --calendar-day-row-height: 28px;
  --calendar-day-row-gap: 6px;
  --calendar-range-lane-height: 18px;
  --calendar-range-top: calc(
    var(--calendar-cell-padding-top) +
    var(--calendar-day-row-height) +
    var(--calendar-day-row-gap)
  );
  grid-template-columns: minmax(0, 1fr);
  gap: 3px;
}

.calendar-week-row {
  position: relative;
}

.calendar-week-row__cells {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: var(--calendar-grid-gap);
}

.weekday-row {
  margin-bottom: 0;
  color: var(--ink-soft);
  font-size: 0.68rem;
  font-weight: 700;
  text-align: center;
}

.calendar-cell {
  display: flex;
  flex-direction: column;
  min-height: 86px;
  padding: 3px 2px 3px;
  border-radius: 14px;
  border: 1px solid rgba(150, 67, 61, 0.08);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(251, 244, 239, 0.92));
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82);
  text-align: left;
  color: var(--ink);
}

.calendar-cell--outside {
  background: rgba(248, 240, 234, 0.72);
  border-color: rgba(150, 67, 61, 0.04);
  color: rgba(111, 87, 81, 0.42);
}

.calendar-cell--today {
  border-color: rgba(96, 148, 92, 0.58);
  background:
    radial-gradient(circle at top right, rgba(255, 223, 105, 0.62), transparent 38%),
    linear-gradient(180deg, rgba(249, 255, 225, 0.98), rgba(228, 246, 212, 0.96));
  box-shadow:
    0 12px 24px rgba(96, 148, 92, 0.16),
    inset 0 0 0 1px rgba(255, 213, 72, 0.5);
}

.calendar-cell--selected {
  border-color: rgba(150, 67, 61, 0.28);
  box-shadow: inset 0 0 0 1px rgba(150, 67, 61, 0.12);
}

.calendar-cell--today.calendar-cell--selected {
  border-color: rgba(96, 148, 92, 0.68);
  box-shadow:
    0 12px 24px rgba(96, 148, 92, 0.16),
    inset 0 0 0 2px rgba(255, 213, 72, 0.58);
}

.calendar-cell__day {
  display: inline-flex;
  padding-left: 1px;
  color: inherit;
  font-weight: 700;
  font-size: 0.88rem;
  line-height: 1;
}

.calendar-cell__day-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 2px;
  min-height: var(--calendar-day-row-height);
  margin-bottom: var(--calendar-day-row-gap);
}

.calendar-cell--today .calendar-cell__day {
  min-width: 22px;
  min-height: 22px;
  align-items: center;
  justify-content: center;
  margin-bottom: 4px;
  border-radius: 999px;
  background: #f8d44f;
  color: #295a2e;
  box-shadow: 0 4px 12px rgba(126, 150, 45, 0.24);
}

.calendar-cell__garbage,
.calendar-week-chip__garbage {
  font-size: 0.72rem;
  line-height: 1;
  opacity: 0.9;
  filter: drop-shadow(0 2px 4px rgba(65, 88, 82, 0.14));
}

.calendar-cell__day--saturday {
  color: #5678b1;
}

.calendar-cell__day--sunday {
  color: #bc5a55;
}

.calendar-cell__events {
  display: grid;
  gap: 2px;
  align-content: start;
  min-width: 0;
}

.calendar-cell__ranges {
  position: relative;
  min-height: calc(var(--range-lanes, 0) * var(--calendar-range-lane-height));
  margin-bottom: 2px;
  min-width: 0;
}

.calendar-cell__range {
  position: absolute;
  top: calc(var(--range-lane, 0) * var(--calendar-range-lane-height));
  height: 15px;
  display: flex;
  align-items: center;
  padding: 0 4px;
  border: 1px solid rgba(150, 67, 61, 0.12);
  font-size: 0.5rem;
  font-weight: 700;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  pointer-events: none;
  z-index: 1;
}

.calendar-cell__range--single {
  left: 0;
  right: 0;
  border-radius: 999px;
}

.calendar-cell__range--start {
  left: 0;
  right: calc(-1 * var(--calendar-grid-gap));
  padding-right: 8px;
  border-radius: 999px 0 0 999px;
}

.calendar-cell__range--middle {
  left: calc(-1 * var(--calendar-grid-gap));
  right: calc(-1 * var(--calendar-grid-gap));
  border-radius: 0;
}

.calendar-cell__range--end {
  left: calc(-1 * var(--calendar-grid-gap));
  right: 0;
  padding-left: 8px;
  border-radius: 0 999px 999px 0;
}

.calendar-cell__range--color-default {
  border-color: rgba(150, 67, 61, 0.14);
  background:
    linear-gradient(180deg, rgba(250, 237, 230, 0.98), rgba(242, 223, 213, 0.94));
  color: #864b41;
}

.calendar-cell__range--color-red {
  border-color: rgba(193, 73, 66, 0.16);
  background:
    linear-gradient(180deg, rgba(252, 228, 226, 0.98), rgba(246, 212, 208, 0.94));
  color: #9f3933;
}

.calendar-cell__range--color-green {
  border-color: rgba(74, 131, 117, 0.16);
  background:
    linear-gradient(180deg, rgba(223, 242, 236, 0.98), rgba(206, 231, 224, 0.94));
  color: #24594d;
}

.calendar-cell__range--color-blue {
  border-color: rgba(83, 118, 171, 0.16);
  background:
    linear-gradient(180deg, rgba(228, 238, 252, 0.98), rgba(214, 227, 246, 0.94));
  color: #355f9a;
}

.calendar-cell__chip,
.calendar-cell__more {
  display: block;
  padding: 2px 3px;
  border-radius: 7px;
  font-size: 0.54rem;
  line-height: 1.16;
  text-align: left;
  white-space: normal;
  word-break: break-word;
  overflow: hidden;
  display: -webkit-box;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;
  min-height: 2.32em;
}

.calendar-cell__chip {
  border: 1px solid rgba(150, 67, 61, 0.12);
  background:
    linear-gradient(180deg, rgba(250, 237, 230, 0.98), rgba(242, 223, 213, 0.94));
  color: #864b41;
}

.calendar-cell__chip--color-default {
  border-color: rgba(150, 67, 61, 0.12);
  background:
    linear-gradient(180deg, rgba(250, 237, 230, 0.98), rgba(242, 223, 213, 0.94));
  color: #864b41;
}

.calendar-cell__chip--color-red {
  border-color: rgba(193, 73, 66, 0.16);
  background:
    linear-gradient(180deg, rgba(252, 228, 226, 0.98), rgba(246, 212, 208, 0.94));
  color: #9f3933;
}

.calendar-cell__chip--color-green {
  border-color: rgba(74, 131, 117, 0.16);
  background:
    linear-gradient(180deg, rgba(223, 242, 236, 0.98), rgba(206, 231, 224, 0.94));
  color: #24594d;
}

.calendar-cell__chip--color-blue {
  border-color: rgba(83, 118, 171, 0.16);
  background:
    linear-gradient(180deg, rgba(228, 238, 252, 0.98), rgba(214, 227, 246, 0.94));
  color: #355f9a;
}

.calendar-cell__more {
  min-height: 0;
  background: rgba(150, 67, 61, 0.08);
  color: var(--accent-strong);
  text-align: center;
  display: block;
  line-height: 1.25;
}

.calendar-week-strip {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 6px;
}

.calendar-week-chip {
  min-height: 74px;
  padding: 8px 4px;
  border-radius: 16px;
  border: 1px solid rgba(150, 67, 61, 0.08);
  background: rgba(255, 255, 255, 0.76);
  color: var(--ink);
  text-align: center;
}

.calendar-week-chip--active {
  background:
    linear-gradient(180deg, rgba(255, 245, 240, 0.98), rgba(247, 231, 223, 0.96));
  border-color: rgba(150, 67, 61, 0.22);
  box-shadow: 0 12px 26px rgba(120, 49, 44, 0.12);
}

.calendar-week-chip--today {
  border-color: rgba(96, 148, 92, 0.5);
  background:
    radial-gradient(circle at top right, rgba(255, 223, 105, 0.48), transparent 42%),
    linear-gradient(180deg, rgba(249, 255, 225, 0.98), rgba(228, 246, 212, 0.96));
  box-shadow: inset 0 0 0 1px rgba(255, 213, 72, 0.4);
}

.calendar-week-chip--outside {
  color: rgba(111, 87, 81, 0.42);
}

.calendar-week-chip__weekday {
  display: block;
  font-size: 0.72rem;
  color: var(--ink-soft);
}

.calendar-week-chip__day {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  margin-top: 8px;
  font-size: 1rem;
  line-height: 1;
}

.calendar-week-chip__count {
  display: block;
  min-height: 1em;
  margin-top: 8px;
  font-size: 0.72rem;
  color: var(--accent);
}

.calendar-week-focus {
  padding: 14px 12px 12px;
  border-radius: 22px;
  border: 1px solid rgba(255, 255, 255, 0.8);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.84), rgba(248, 237, 230, 0.9));
}

.calendar-week-focus__head {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 12px;
  margin-bottom: 12px;
}

.calendar-week-focus__title {
  margin: 0;
  color: var(--ink);
  font-size: 1rem;
  line-height: 1.45;
}

.calendar-week-focus__count {
  display: inline-flex;
  align-items: center;
  min-height: 30px;
  padding: 0 10px;
  border-radius: 999px;
  background: rgba(150, 67, 61, 0.08);
  color: var(--accent-strong);
  font-size: 0.76rem;
  font-weight: 700;
  white-space: nowrap;
}

.calendar-week-floating {
  display: grid;
  gap: 10px;
  margin-bottom: 14px;
}

.calendar-week-floating__item {
  display: grid;
  gap: 6px;
  padding: 12px 14px;
  border-radius: 18px;
  border: 1px solid rgba(150, 67, 61, 0.1);
  background:
    linear-gradient(180deg, rgba(255, 248, 243, 0.96), rgba(248, 236, 227, 0.92));
  color: var(--ink);
  text-align: left;
}

.calendar-week-floating__item--tone-default {
  border-color: rgba(150, 67, 61, 0.1);
  background:
    linear-gradient(180deg, rgba(255, 248, 243, 0.96), rgba(248, 236, 227, 0.92));
}

.calendar-week-floating__item--tone-red {
  border-color: rgba(193, 73, 66, 0.14);
  background:
    linear-gradient(180deg, rgba(252, 234, 232, 0.98), rgba(247, 220, 216, 0.94));
}

.calendar-week-floating__item--tone-green {
  border-color: rgba(74, 131, 117, 0.14);
  background:
    linear-gradient(180deg, rgba(229, 244, 239, 0.98), rgba(214, 235, 227, 0.94));
}

.calendar-week-floating__item--tone-blue {
  border-color: rgba(83, 118, 171, 0.14);
  background:
    linear-gradient(180deg, rgba(234, 241, 252, 0.98), rgba(220, 230, 247, 0.94));
}

.calendar-week-floating__time {
  color: var(--accent);
  font-size: 0.76rem;
  font-weight: 700;
}

.calendar-week-floating__title {
  font-size: 0.92rem;
  line-height: 1.45;
}

.calendar-week-timeline {
  position: relative;
  min-height: 864px;
}

.calendar-week-hours {
  position: relative;
  z-index: 1;
}

.calendar-week-hour {
  display: grid;
  grid-template-columns: 36px minmax(0, 1fr);
  gap: 10px;
  height: 54px;
}

.calendar-week-hour__label {
  color: rgba(111, 87, 81, 0.74);
  font-size: 0.78rem;
  line-height: 1;
}

.calendar-week-hour__line {
  height: 100%;
  border-top: 1px solid rgba(150, 67, 61, 0.08);
}

.calendar-week-events {
  position: absolute;
  inset: 0 0 0 46px;
  z-index: 2;
}

.calendar-week-event {
  position: absolute;
  left: 0;
  right: 0;
  padding: 10px 12px;
  border-radius: 16px;
  border: 1px solid rgba(74, 131, 117, 0.18);
  background:
    linear-gradient(180deg, rgba(223, 242, 236, 0.98), rgba(206, 231, 224, 0.94));
  box-shadow: 0 12px 24px rgba(74, 131, 117, 0.12);
  color: var(--ink);
  text-align: left;
}

.calendar-week-event--tone-default {
  border-color: rgba(150, 67, 61, 0.16);
  background:
    linear-gradient(180deg, rgba(252, 238, 231, 0.98), rgba(243, 224, 214, 0.94));
  box-shadow: 0 12px 24px rgba(150, 67, 61, 0.12);
}

.calendar-week-event--tone-red {
  border-color: rgba(193, 73, 66, 0.18);
  background:
    linear-gradient(180deg, rgba(252, 228, 226, 0.98), rgba(246, 212, 208, 0.94));
  box-shadow: 0 12px 24px rgba(193, 73, 66, 0.12);
}

.calendar-week-event--tone-green {
  border-color: rgba(74, 131, 117, 0.18);
  background:
    linear-gradient(180deg, rgba(223, 242, 236, 0.98), rgba(206, 231, 224, 0.94));
  box-shadow: 0 12px 24px rgba(74, 131, 117, 0.12);
}

.calendar-week-event--tone-blue {
  border-color: rgba(83, 118, 171, 0.18);
  background:
    linear-gradient(180deg, rgba(228, 238, 252, 0.98), rgba(214, 227, 246, 0.94));
  box-shadow: 0 12px 24px rgba(83, 118, 171, 0.12);
}

.calendar-week-event__time {

function attachPressFeedback() {
  document.addEventListener(
    "pointerdown",
    (event) => {
      const eventElement = getEventElement(event);
      if (!eventElement) {
        return;
      }

      const target = eventElement.closest(".pressable");
      if (!target) {
        return;
      }

      const rect = target.getBoundingClientRect();
      target.style.setProperty("--press-x", `${event.clientX - rect.left}px`);
      target.style.setProperty("--press-y", `${event.clientY - rect.top}px`);
      target.classList.add("is-held", "is-tap-flash");

      window.setTimeout(() => {
        target.classList.remove("is-tap-flash");
      }, 220);

      const clear = () => {
        target.classList.remove("is-held");
        window.removeEventListener("pointerup", clear);
        window.removeEventListener("pointercancel", clear);
        window.removeEventListener("pointerleave", clear);
      };

      window.addEventListener("pointerup", clear, { once: true });
      window.addEventListener("pointercancel", clear, { once: true });
      window.addEventListener("pointerleave", clear, { once: true });
    },
    { passive: true }
  );
}

function getEventElement(event) {
  const target = event.target;
  if (target instanceof Element) {
    return target;
  }

  if (target && target.parentElement instanceof Element) {
    return target.parentElement;
  }

  return null;
}

              aria-pressed="${String(isPinned)}"
              aria-label="${isPinned ? "ピン留めを外す" : "ピン留めする"}"
              title="${isPinned ? "ピン留めを外す" : "ピン留めする"}"
            >
              📌
            </button>
          </article>
        `;
      })
      .join("");

    article.innerHTML = `
      <button
        type="button"
        class="month-header pressable"
        data-month-toggle="${group.key}"
        aria-expanded="${String(isOpen)}"
      >
        <div>
          <h3 class="month-header__title">${group.label}</h3>
          <p class="month-summary">${group.notices.length}件のお知らせ</p>
        </div>
        <div>
          <span class="month-header__count">${isOpen ? "閉じる" : "開く"}</span>
          <span class="month-header__mark">${isOpen ? "▾" : "▸"}</span>
        </div>
      </button>
      <div class="month-body" ${isOpen ? "" : "hidden"}>
        ${cardsMarkup}
      </div>
    `;

    refs.noticeMonths.appendChild(article);
  });
}

function renderNoticeSourceTabs() {
  if (refs.noticeBoard) {
    refs.noticeBoard.dataset.sourceTheme = state.activeNoticeSource;
  }

  refs.noticeSourceButtons.forEach((button) => {
    const sourceKey = button.dataset.noticeSource;
    const active = sourceKey === state.activeNoticeSource;
