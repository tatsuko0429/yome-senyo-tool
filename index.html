function renderCalendarViewButtons() {
  refs.calendarViewButtons.forEach((button) => {
    const active = button.dataset.calendarView === state.calendarView;
    button.classList.toggle("calendar-view-button--active", active);
    button.setAttribute("aria-selected", String(active));
  });
}

function renderCalendar() {
  renderCalendarViewButtons();

  if (state.calendarView === "month") {
    refs.calendarModeLabel.textContent = "月間表示";
    refs.calendarMonthLabel.textContent = formatMonthHeadline(state.currentMonth);
    refs.calendarMonthView.hidden = false;
    refs.calendarWeekView.hidden = true;
    refs.prevMonthButton.textContent = "前月";
    refs.nextMonthButton.textContent = "次月";
    refs.prevMonthButton.setAttribute("aria-label", "前の月へ");
    refs.nextMonthButton.setAttribute("aria-label", "次の月へ");

    if (refs.prevMonthButton) {
      refs.prevMonthButton.disabled = isMinCalendarMonth(state.currentMonth);
    }

    renderMonthCalendar();
    return;
  }

  const selectedDateKey = ensureSelectedDate();
  refs.calendarModeLabel.textContent = "週間表示";
  refs.calendarMonthLabel.textContent = formatWeekHeadline(selectedDateKey);
  refs.calendarMonthView.hidden = true;
  refs.calendarWeekView.hidden = false;
  refs.prevMonthButton.textContent = "前週";
  refs.nextMonthButton.textContent = "次週";
  refs.prevMonthButton.setAttribute("aria-label", "前の週へ");
  refs.nextMonthButton.setAttribute("aria-label", "次の週へ");

  if (refs.prevMonthButton) {
    refs.prevMonthButton.disabled = isMinCalendarWeek(selectedDateKey);
  }

  renderWeekCalendar(selectedDateKey);
}

function renderMonthCalendar() {
  refs.calendarGrid.innerHTML = "";
  const monthDays = buildMonthCalendarCells(state.currentMonth);

  for (let rowStartIndex = 0; rowStartIndex < monthDays.length; rowStartIndex += 7) {
    const rowCells = monthDays.slice(rowStartIndex, rowStartIndex + 7);
    const row = document.createElement("div");
    row.className = "calendar-week-row";

    const cellsWrapper = document.createElement("div");
    cellsWrapper.className = "calendar-week-row__cells";

    rowCells.forEach((cell) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = [
        "calendar-cell",
        "pressable",
        cell.isOutside ? "calendar-cell--outside" : "",
        cell.isToday ? "calendar-cell--today" : "",
        cell.date === state.selectedDate ? "calendar-cell--selected" : "",
        cell.isSaturday ? "calendar-cell--saturday" : "",
        cell.isSunday ? "calendar-cell--sunday" : "",
        cell.events.length > 0 ? "calendar-cell--has-events" : "",
      ]
        .filter(Boolean)
        .join(" ");

      if (cell.isDisabled) {
        button.disabled = true;
      } else if (cell.date) {
        button.dataset.date = cell.date;
      }

      const rangeMarkup = (cell.rangeSegments || [])
        .map((segment) => {
          const shapeClass =
            segment.isActualStart && segment.isActualEnd
              ? "calendar-cell__range--single"
              : segment.isActualStart
                ? "calendar-cell__range--start"
                : segment.isActualEnd
                  ? "calendar-cell__range--end"
                  : "calendar-cell__range--middle";

          return `<span class="calendar-cell__range ${shapeClass} calendar-cell__range--color-${getScheduleColorTone(
            segment.schedule
          )}" style="--range-lane:${segment.lane}" title="${escapeHtml(
            segment.schedule.title
          )}">${segment.showLabel ? escapeHtml(segment.schedule.title) : ""}</span>`;
        })
        .join("");

      const visibleEvents = cell.visibleEvents || cell.events;
      const eventMarkup = visibleEvents
        .slice(0, 3)
        .map(
          (schedule) =>
            `<span class="calendar-cell__chip ${
              `calendar-cell__chip--color-${getScheduleColorTone(schedule)}`
            }" title="${escapeHtml(schedule.title)}">${escapeHtml(schedule.title)}</span>`
        )
        .join("");
      const extraMarkup =
        visibleEvents.length > 3
          ? `<span class="calendar-cell__more">+${visibleEvents.length - 3}</span>`
          : "";
      const garbageMarkup = cell.isGarbageDay
        ? `<span class="calendar-cell__garbage" title="ゴミの日" aria-label="ゴミの日">🗑️</span>`
        : "";

      button.innerHTML = `
        <span class="calendar-cell__day-row">
          <span class="calendar-cell__day ${
            cell.isSaturday ? "calendar-cell__day--saturday" : ""
          } ${cell.isSunday ? "calendar-cell__day--sunday" : ""}">
            ${cell.dayLabel}
          </span>
          ${garbageMarkup}
        </span>
        <div class="calendar-cell__ranges" style="--range-lanes:${cell.rangeLaneCount || 0}">${rangeMarkup}</div>
        <div class="calendar-cell__events">
          ${eventMarkup}
          ${extraMarkup}
        </div>
      `;

      cellsWrapper.appendChild(button);
    });

    row.appendChild(cellsWrapper);
    refs.calendarGrid.appendChild(row);
  }
}

function renderWeekCalendar(selectedDateKey) {
  const weekDates = buildWeekDates(selectedDateKey);
  refs.calendarWeekStrip.innerHTML = "";

  weekDates.forEach((date) => {
    const dateKey = toDateKey(date);
    const schedules = getSchedulesForDate(dateKey);
    const button = document.createElement("button");
    button.type = "button";
    button.className = [
      "calendar-week-chip",
      "pressable",
      dateKey === selectedDateKey ? "calendar-week-chip--active" : "",
      dateKey === toDateKey(new Date()) ? "calendar-week-chip--today" : "",
      date.getMonth() !== parseDateTime(`${selectedDateKey}T00:00`).getMonth()
        ? "calendar-week-chip--outside"
        : "",
    ]
      .filter(Boolean)
      .join(" ");

    if (date < MIN_CALENDAR_MONTH) {
      button.disabled = true;
    } else {
      button.dataset.weekSelectDate = dateKey;
    }

    button.innerHTML = `
      <span class="calendar-week-chip__weekday">${formatWeekdayShort(date)}</span>
      <strong class="calendar-week-chip__day">
        ${date.getDate()}
        ${isGarbageCollectionDay(date) ? `<span class="calendar-week-chip__garbage" title="ゴミの日" aria-label="ゴミの日">🗑️</span>` : ""}
      </strong>
      <span class="calendar-week-chip__count">${
        schedules.length > 0 ? `${schedules.length}件` : ""
      }</span>
    `;

    refs.calendarWeekStrip.appendChild(button);
  });

  const schedules = getSchedulesForDate(selectedDateKey);
  refs.calendarWeekDateLabel.textContent = formatDateHeadline(selectedDateKey);
  refs.calendarWeekCount.textContent = schedules.length > 0 ? `${schedules.length}件` : "予定なし";
  renderWeekTimeline(selectedDateKey, schedules);
}

function renderWeekTimeline(dateKey, schedules) {
  const timeline = refs.calendarWeekTimeline;
  const startHour = 6;
  const endHour = 22;
  const rowHeight = 54;
  const totalRows = endHour - startHour;
  const timedSchedules = schedules.filter(hasScheduleTimeRange);
  const flexibleSchedules = schedules.filter((schedule) => !hasScheduleTimeRange(schedule));

  timeline.innerHTML = "";

  if (flexibleSchedules.length > 0) {
    const flexibleList = document.createElement("div");
    flexibleList.className = "calendar-week-floating";

    flexibleSchedules.forEach((schedule) => {
      const item = document.createElement("button");
      item.type = "button";
      item.className = `calendar-week-floating__item calendar-week-floating__item--tone-${getScheduleColorTone(
        schedule
      )} pressable`;
      item.dataset.date = dateKey;
      const timeLabel = getScheduleTimeLabel(schedule, "");
      item.innerHTML = `
        ${timeLabel ? `<span class="calendar-week-floating__time">${escapeHtml(timeLabel)}</span>` : ""}
        <strong class="calendar-week-floating__title">${escapeHtml(schedule.title)}</strong>
      `;
      flexibleList.appendChild(item);
    });

    timeline.appendChild(flexibleList);
  }

  const hours = document.createElement("div");
  hours.className = "calendar-week-hours";

  for (let hour = startHour; hour < endHour; hour += 1) {
    const row = document.createElement("div");
    row.className = "calendar-week-hour";
    row.innerHTML = `
      <span class="calendar-week-hour__label">${String(hour).padStart(2, "0")}</span>
      <div class="calendar-week-hour__line"></div>
    `;
    hours.appendChild(row);
  }

  timeline.appendChild(hours);

  const eventsLayer = document.createElement("div");
  eventsLayer.className = "calendar-week-events";
  eventsLayer.style.height = `${totalRows * rowHeight}px`;

  if (timedSchedules.length === 0) {
    const empty = document.createElement("div");
    empty.className = "calendar-week-empty";
    empty.textContent =
      flexibleSchedules.length > 0 ? "時刻指定の予定はありません" : "予定はありません";
    eventsLayer.appendChild(empty);
  } else {
    timedSchedules.forEach((schedule) => {
      const startMinutes = parseTimeToMinutes(schedule.start);
      const endMinutes = Math.max(startMinutes + 30, parseTimeToMinutes(schedule.end));
      const top = Math.max(0, ((startMinutes - startHour * 60) / 60) * rowHeight);
      const height = Math.max(44, ((endMinutes - startMinutes) / 60) * rowHeight - 8);

      const item = document.createElement("button");
      item.type = "button";
      item.className = `calendar-week-event calendar-week-event--tone-${getScheduleColorTone(
        schedule
      )} pressable`;
      item.dataset.date = dateKey;
      item.style.top = `${top}px`;
      item.style.height = `${height}px`;
      item.innerHTML = `
        <span class="calendar-week-event__time">${getScheduleTimeLabel(schedule)}</span>
        <strong class="calendar-week-event__title">${escapeHtml(schedule.title)}</strong>
      `;
      eventsLayer.appendChild(item);
    });
  }

  if (dateKey === toDateKey(new Date())) {
    const now = new Date();
    const nowMinutes = now.getHours() * 60 + now.getMinutes();
    if (nowMinutes >= startHour * 60 && nowMinutes <= endHour * 60) {
      const nowLine = document.createElement("div");
      nowLine.className = "calendar-week-now";
      nowLine.style.top = `${((nowMinutes - startHour * 60) / 60) * rowHeight}px`;
      eventsLayer.appendChild(nowLine);
    }
  }

  timeline.appendChild(eventsLayer);
}

function syncPanelVisibility() {
  refs.panels.forEach((panel) => {
    const active = panel.dataset.panel === state.activePanel;
    panel.hidden = !active;
    panel.classList.toggle("panel--active", active);
  });
}

function syncNavButtons() {
  refs.navButtons.forEach((button) => {
    const active = button.dataset.openPanel === state.activePanel;
    button.classList.toggle("nav-button--active", active);
  });
}

function setActivePanel(panelName) {
  if (panelName === "notices" && !state.isNoticeAuthenticated) {
    requestNoticeAccess(() => setActivePanel("notices"));
    return;
  }

  state.activePanel = panelName;
  renderHeader();
  syncPanelVisibility();
  syncNavButtons();
}

function setCalendarView(viewName) {
  if (!viewName || state.calendarView === viewName) {
    return;
  }

  state.calendarView = viewName;

  if (viewName === "week") {
    const currentMonthKey = `${state.currentMonth.getFullYear()}-${String(
      state.currentMonth.getMonth() + 1
    ).padStart(2, "0")}`;
    const selectedMonthKey = getYearMonthKey(`${ensureSelectedDate()}T00:00`);

    if (selectedMonthKey !== currentMonthKey) {
      state.selectedDate = toDateKey(state.currentMonth);
    }
  } else {
    state.currentMonth = clampMonth(
      getStartOfMonth(parseDateTime(`${ensureSelectedDate()}T00:00`))
    );
  }

  renderCalendar();
}

function selectWeekDate(dateKey) {
  state.selectedDate = dateKey;
  state.currentMonth = clampMonth(getStartOfMonth(parseDateTime(`${dateKey}T00:00`)));
  renderCalendar();
}

function setActiveNoticeSource(sourceKey) {
  if (state.activeNoticeSource === sourceKey) {
    return;
  }

  state.activeNoticeSource = sourceKey;
  renderNotices();
}

function syncAuthGate() {
  refs.authGate.hidden = state.isAuthenticated;
  refs.appShell.hidden = !state.isAuthenticated;
  document.body.classList.toggle("auth-locked", !state.isAuthenticated);
  updateAuthDisplay();
}

function appendAuthDigit(digit) {
  if (state.isAuthenticated || state.authInput.length >= 4) {
    return;
  }

  state.authInput = `${state.authInput}${digit}`;
  refs.authError.hidden = true;
  updateAuthDisplay();

  if (state.authInput.length === 4) {
    submitAuthInput();
  }
}

function removeAuthDigit() {
  if (state.isAuthenticated || state.authInput.length === 0) {
    return;
  }

  state.authInput = state.authInput.slice(0, -1);
  refs.authError.hidden = true;
  updateAuthDisplay();
}

function clearAuthInput() {
  if (state.isAuthenticated) {
    return;
  }

  state.authInput = "";
  refs.authError.hidden = true;
  updateAuthDisplay();
}

function updateAuthDisplay() {
  refs.authSlots.forEach((slot, index) => {
    slot.textContent = state.authInput[index] ? "●" : "";
    slot.classList.toggle("auth-slot--filled", Boolean(state.authInput[index]));
  });
}

function submitAuthInput() {
  if (state.authInput !== AUTH_PASSWORD) {
    refs.authError.hidden = false;
    state.authInput = "";
    updateAuthDisplay();
    return;
  }

  state.isAuthenticated = true;
  saveGrantedAuth();
  syncAuthGate();
  openInitialScheduleDetail();
}

function requestNoticeAccess(onSuccess) {
  if (state.isNoticeAuthenticated) {
    if (typeof onSuccess === "function") {
      onSuccess();
    }
    return;
  }

  openNoticeAuthModal(onSuccess);
}

function openNoticeAuthModal(onSuccess) {
  let inputValue = "";

  const wrapper = document.createElement("div");
  wrapper.className = "auth-card";
  wrapper.setAttribute("aria-label", "お知らせの認証");

  const title = document.createElement("h3");
  title.className = "auth-card__title";
  title.textContent = "お知らせを開くにはパスワードが必要です。";

  const text = document.createElement("p");
  text.className = "auth-card__text";
  text.innerHTML = "この確認は初回のみです。<br />認証後は、この端末で続けて確認できます。";

  const display = document.createElement("div");
  display.className = "auth-display";
  display.setAttribute("aria-live", "polite");

  const slots = Array.from({ length: 4 }, () => {
    const slot = document.createElement("span");
    slot.className = "auth-slot";
    display.appendChild(slot);
    return slot;
  });

  const error = document.createElement("p");
  error.className = "auth-error";
  error.hidden = true;
  error.textContent = "パスワードが違います。";

  const keypad = document.createElement("div");
  keypad.className = "auth-keypad";
  keypad.setAttribute("aria-label", "数字キー");

  const updateDisplay = () => {
    slots.forEach((slot, index) => {
      slot.textContent = inputValue[index] ? "●" : "";
      slot.classList.toggle("auth-slot--filled", Boolean(inputValue[index]));
    });
  };

  const submit = () => {
    if (inputValue !== NOTICE_AUTH_PASSWORD) {
      error.hidden = false;
      inputValue = "";
      updateDisplay();
      return;
    }

    state.isNoticeAuthenticated = true;
    saveGrantedNoticeAuth();
    closeModal();

    if (typeof onSuccess === "function") {
      onSuccess();
    }
  };

  const appendDigit = (digit) => {
    if (inputValue.length >= 4) {
      return;
    }

    inputValue = `${inputValue}${digit}`;
    error.hidden = true;
    updateDisplay();

    if (inputValue.length === 4) {
      submit();
    }
  };

  const clearInput = () => {
    inputValue = "";
    error.hidden = true;
    updateDisplay();
  };

  const removeDigit = () => {
    if (!inputValue.length) {
      return;
    }

    inputValue = inputValue.slice(0, -1);
    error.hidden = true;
    updateDisplay();
  };

  [
    "1",
    "2",
    "3",
    "4",
    "5",
    "6",
    "7",
    "8",
    "9",
    "clear",
    "0",
    "delete",
  ].forEach((key) => {
    const button = document.createElement("button");
    button.type = "button";
    button.className = `auth-key${key === "clear" || key === "delete" ? " auth-key--sub" : ""} pressable`;

    if (key === "clear") {
      button.textContent = "消去";
      button.addEventListener("click", clearInput);
    } else if (key === "delete") {
      button.textContent = "←";
      button.addEventListener("click", removeDigit);
    } else {
      button.textContent = key;
      button.addEventListener("click", () => appendDigit(key));
    }

    keypad.appendChild(button);
  });

  wrapper.appendChild(title);
  wrapper.appendChild(text);
  wrapper.appendChild(display);
  wrapper.appendChild(error);
  wrapper.appendChild(keypad);
  updateDisplay();

  openModal({
    kicker: "",
    title: "",
    meta: "",
    bodyContent: wrapper,
    actions: [],
  });
}

function openInitialScheduleDetail() {
  if (!state.isAuthenticated || state.hasOpenedInitialScheduleDetail) {
    return;
  }

  state.hasOpenedInitialScheduleDetail = true;
  const initialDateKey = toDateKey(getInitialCalendarDate());
  state.activePanel = "calendar";
  state.calendarView = "month";
  state.currentMonth = clampMonth(
    getStartOfMonth(parseDateTime(`${initialDateKey}T00:00`))
  );
  state.selectedDate = initialDateKey;
  render();
  openScheduleDetail(initialDateKey);
}

function toggleMonth(monthKey) {
  if (state.openNoticeMonths.has(monthKey)) {
    state.openNoticeMonths.delete(monthKey);
  } else {
    state.openNoticeMonths.add(monthKey);
  }

  renderNotices();
}

function navigateMonth(direction) {
  if (state.calendarView === "week") {
    const deltaDays = direction === "prev" ? -7 : 7;
    const nextDate = addDays(parseDateTime(`${ensureSelectedDate()}T00:00`), deltaDays);
    const clampedDate = nextDate < MIN_CALENDAR_MONTH ? new Date(MIN_CALENDAR_MONTH) : nextDate;
    state.selectedDate = toDateKey(clampedDate);
    state.currentMonth = clampMonth(getStartOfMonth(clampedDate));
    renderCalendar();
    return;
  }

  const delta = direction === "prev" ? -1 : 1;
  const nextMonth = new Date(
    state.currentMonth.getFullYear(),
    state.currentMonth.getMonth() + delta,
    1
  );
  state.currentMonth = clampMonth(nextMonth);

  if (direction === "prev" && isMinCalendarMonth(state.currentMonth)) {
    state.currentMonth = MIN_CALENDAR_MONTH;
  }

  state.selectedDate = null;
  renderStatus();
  renderCalendar();
}

function handleCalendarTouchStart(event) {
  const touch = event.changedTouches[0];
  state.touch.startX = touch.clientX;
  state.touch.startY = touch.clientY;
}

function handleCalendarTouchEnd(event) {
  const touch = event.changedTouches[0];
  const deltaX = touch.clientX - state.touch.startX;
  const deltaY = touch.clientY - state.touch.startY;

  if (Math.abs(deltaX) < 48 || Math.abs(deltaX) < Math.abs(deltaY)) {
    return;
  }

  if (deltaX > 0 && isMinCalendarMonth(state.currentMonth)) {
    return;
  }

  navigateMonth(deltaX < 0 ? "next" : "prev");
}

function openNoticeDetail(noticeId, options = {}) {
  if (!state.isNoticeAuthenticated) {
    requestNoticeAccess(() => openNoticeDetail(noticeId, options));
    return;
  }

  const notice = appData.notices.find((item) => item.id === noticeId);
  if (!notice) {
    return;
  }

  markNoticeAsRead(notice.id);
  const bodyFragment = document.createDocumentFragment();
  const detailBody = document.createElement("div");
  detailBody.className = "notice-detail-body";
  notice.body.split("\n\n").forEach((paragraph) => {
    const p = document.createElement("p");
    p.textContent = paragraph;
    detailBody.appendChild(p);
  });

  const attachments = Array.isArray(notice.attachments) ? notice.attachments : [];
  if (attachments.length > 0) {
    const attachmentList = document.createElement("div");
    attachmentList.className = "notice-attachments";

    attachments.forEach((attachment) => {
      const link = document.createElement("a");
      link.className = "notice-attachment pressable";
      link.href = attachment.href;
      link.download = attachment.download || attachment.label || "";
      link.rel = "noopener";
      link.innerHTML = `
        <span class="notice-attachment__name">${escapeHtml(attachment.label)}</span>
        <span class="notice-attachment__type">${escapeHtml(
          attachment.type || "添付"
        )}</span>
      `;
      attachmentList.appendChild(link);
    });

    detailBody.appendChild(attachmentList);
  }

  bodyFragment.appendChild(detailBody);

  openModal({
    kicker: "",
    title: notice.title,
    meta: `${formatDateTime(notice.publishedAt)} に掲載`,
    bodyContent: bodyFragment,
    modalClass: "notice",
    actions: [
      {
        label: options.returnToUnreadSummary ? "未確認一覧に戻る" : "一覧に戻る",
        onClick: options.returnToUnreadSummary ? openUnreadSummary : closeModal,
      },
    ],
  });
}

function openScheduleDetail(dateKey, options = {}) {
  if (options.syncCalendarSelection !== false) {
    state.selectedDate = dateKey;
    renderCalendar();
  }

  const detailOptions = {
    returnToUnreadSummary: Boolean(options.returnToUnreadSummary),
    syncCalendarSelection: options.syncCalendarSelection !== false,
  };
  const schedules = getSchedulesForDate(dateKey);
  markSchedulesAsRead(
    schedules.filter((schedule) => !isRecurringSchedule(schedule)).map((schedule) => schedule.id)
  );
  const body = document.createElement("div");
  body.className = "calendar-event-list";

  if (schedules.length === 0) {
    const empty = document.createElement("p");
    empty.className = "empty-text";
    empty.textContent = "この日は予定が入っていません。";
    body.appendChild(empty);
  } else {
    schedules.forEach((schedule) => {
      const description = getScheduleDescription(schedule);
      const tone = getScheduleColorTone(schedule);
      const item = document.createElement("article");
      item.className = `calendar-event calendar-event--tone-${tone}`;
      const timeLabel = getScheduleTimeLabel(schedule, "");
      item.innerHTML = `
        ${timeLabel ? `<span class="calendar-event__time">${escapeHtml(timeLabel)}</span>` : ""}
        <h4 class="calendar-event__title">${escapeHtml(schedule.title)}</h4>
      `;

      const descriptionNode = createScheduleDescriptionContent(description);
      if (descriptionNode) {
        item.appendChild(descriptionNode);
      }

      if (schedule.editable !== false) {
        const actions = document.createElement("div");
        actions.className = "calendar-event__actions";

        const colorButton = document.createElement("button");
        colorButton.type = "button";
        colorButton.className = "schedule-action schedule-action--tone pressable";
        colorButton.textContent = `色: ${getScheduleColorLabel(schedule)}`;
        colorButton.addEventListener("click", () => {
          cycleScheduleColor(schedule.id, dateKey, detailOptions);
        });

        const editButton = document.createElement("button");
        editButton.type = "button";
        editButton.className = "schedule-action pressable";
        editButton.textContent = "編集";
        editButton.addEventListener("click", () => {
          openScheduleEditor(schedule.id, dateKey, detailOptions);
        });

        const deleteButton = document.createElement("button");
        deleteButton.type = "button";
        deleteButton.className = "schedule-action schedule-action--danger pressable";
        deleteButton.textContent = "消去";
        deleteButton.addEventListener("click", () => {
          openScheduleDeleteConfirm(schedule.id, dateKey, detailOptions);
        });

        actions.appendChild(colorButton);
        actions.appendChild(editButton);
        actions.appendChild(deleteButton);
        item.appendChild(actions);
      }
      body.appendChild(item);
    });
  }

  openModal({
    kicker: "",
    title: formatDateHeadline(dateKey),
    meta: "",
    bodyContent: body,
    actions: options.returnToUnreadSummary
      ? [
          {
            label: "未確認一覧に戻る",
            onClick: openUnreadSummary,
          },
        ]
      : [],
  });
}

function openScheduleEditor(scheduleId, dateKey, options = {}) {
  const schedule = getScheduleById(scheduleId, dateKey);
  if (!schedule) {
    openScheduleDetail(dateKey, options);
    return;
  }

  const form = document.createElement("div");
  form.className = "schedule-edit-form";

  const titleField = document.createElement("label");
  titleField.className = "schedule-edit-field";
  titleField.innerHTML = `<span class="field-label">タイトル</span>`;

  const titleInput = document.createElement("input");
  titleInput.type = "text";
  titleInput.className = "schedule-edit-input";
  titleInput.value = schedule.title;
  titleInput.maxLength = 80;
  titleField.appendChild(titleInput);

  const memoField = document.createElement("label");
  memoField.className = "schedule-edit-field";
  memoField.innerHTML = `<span class="field-label">補足メモ</span>`;

  const memoInput = document.createElement("textarea");
  memoInput.className = "schedule-edit-textarea";
  memoInput.rows = 4;
  memoInput.placeholder = "必要な補足があるときだけ入力";
  memoInput.value = schedule.description || "";
  memoField.appendChild(memoInput);

  const error = document.createElement("p");
  error.className = "schedule-edit-error";
  error.hidden = true;

  form.appendChild(titleField);
  form.appendChild(memoField);
  form.appendChild(error);

  openModal({
    kicker: "",
    title: isRecurringSchedule(schedule) ? "繰り返し予定を編集" : "予定を編集",
    meta: formatDateHeadline(dateKey),
    bodyContent: form,
    actions: [
      {
        label: "戻る",
        variant: "ghost",
        onClick: () => openScheduleDetail(dateKey, options),
      },
      {
        label: "保存",
        onClick: () => {
          const nextTitle = titleInput.value.trim();
          const nextDescription = memoInput.value.trim();

          if (!nextTitle) {
            error.textContent = "タイトルを入力してください。";
            error.hidden = false;
            return;
          }

          saveSchedulePatch(
            scheduleId,
            {
              title: nextTitle,
              description: nextDescription,
            },
            dateKey
          );
          openScheduleDetail(dateKey, options);
        },
      },
    ],
  });
}

function openScheduleDeleteConfirm(scheduleId, dateKey, options = {}) {
  const schedule = getScheduleById(scheduleId, dateKey);
  if (!schedule) {
    openScheduleDetail(dateKey, options);
    return;
  }

  const body = document.createElement("div");
  body.className = "schedule-delete-confirm";
  body.innerHTML = `<p>「${escapeHtml(schedule.title)}」を消去します。</p>`;

  openModal({
    kicker: "",
    title: "予定を消去しますか",
    meta: "",
    bodyContent: body,
    actions: [
      {
        label: "戻る",
        variant: "ghost",
        onClick: () => openScheduleDetail(dateKey, options),
      },
      {
        label: "消去する",
        onClick: () => {
          deleteSchedule(scheduleId, dateKey);
          openScheduleDetail(dateKey, options);
        },
      },
    ],
  });
}

function openUnreadSummary() {
  const unreadNotices = getUnreadNotices();
  const unreadSchedules = getUnreadSchedules();
  const wrapper = document.createElement("div");
  wrapper.className = "unread-summary";

  const noticeSection = createUnreadSection(
    "未確認のお知らせ",
    unreadNotices,
    (notice) => {
      closeModal();
      openNoticeDetail(notice.id, { returnToUnreadSummary: true });
    },
    (notice) => {
      const sourceMeta = getNoticeSourceMeta(getNoticeSource(notice));
      return {
        meta: `${sourceMeta.label} / ${formatDateTime(notice.publishedAt)}`,
        title: notice.title,
        summary: getSnippet(notice.body, 78),
      };
    },
    () => {
      markNoticeIdsAsRead(unreadNotices.map((notice) => notice.id));
      openUnreadSummary();
    }
  );

  const scheduleSection = createUnreadSection(
    "未確認の予定",
    unreadSchedules,
    (schedule) => {
      closeModal();
      openScheduleDetail(schedule.date, {
        returnToUnreadSummary: true,
        syncCalendarSelection: false,
      });
    },
    (schedule) => ({
      meta: formatUnreadScheduleMeta(schedule),
      title: schedule.title,
      summary: getSnippet(getScheduleDescription(schedule), 78),
    }),
    () => {
      markSchedulesAsRead(unreadSchedules.map((schedule) => schedule.id));
      openUnreadSummary();
    }
  );

  wrapper.appendChild(noticeSection);
  wrapper.appendChild(scheduleSection);

  openModal({
    kicker: "",
    title: "",
    meta: "",
    bodyContent: wrapper,
    actions: [],
  });
}

function openAlbum() {
  if (!appData.meta.albumUrl) {
    return;
  }

  window.open(appData.meta.albumUrl, "_blank", "noopener,noreferrer");
}

function openModal({ kicker, title, meta, bodyContent, actions, modalClass = "" }) {
  refs.modalKicker.textContent = kicker;
  refs.modalTitle.textContent = title;
  refs.modalMeta.textContent = meta;
  refs.modalKicker.hidden = !kicker;
  refs.modalTitle.hidden = !title;
  refs.modalMeta.hidden = !meta;
  refs.modalCard.classList.toggle("modal-card--plain", !kicker && !title && !meta);
  refs.modalCard.classList.toggle("modal-card--notice", modalClass === "notice");
  refs.modalBody.replaceChildren(bodyContent);
  refs.modalActions.replaceChildren();
  refs.modalActions.hidden = actions.length === 0;

  actions.forEach((action) => {
    const button = document.createElement("button");
    button.type = "button";
    button.className =
      action.variant === "ghost"
        ? "ghost-button pressable"
        : "primary-button pressable";
    button.textContent = action.label;
    button.addEventListener("click", action.onClick, { once: true });
    refs.modalActions.appendChild(button);
  });

  refs.modalRoot.hidden = false;
  document.body.style.overflow = "hidden";
}

function closeModal() {
  refs.modalRoot.hidden = true;
  refs.modalCard.classList.remove("modal-card--plain");
  refs.modalCard.classList.remove("modal-card--notice");
  refs.modalKicker.hidden = false;
  refs.modalTitle.hidden = false;
  refs.modalMeta.hidden = false;
  refs.modalActions.hidden = false;
  document.body.style.overflow = "";
}

function markNoticeAsRead(noticeId) {
  markNoticeIdsAsRead([noticeId]);
}

function markNoticeIdsAsRead(noticeIds) {
  let updated = false;

  noticeIds.forEach((noticeId) => {
    if (!state.readNoticeIds.has(noticeId)) {
      state.readNoticeIds.add(noticeId);
      updated = true;
    }
  });

  if (!updated) {
    return;
  }

  saveReadNoticeIds(state.readNoticeIds);
  renderStatus();
  renderPanels();
  renderNotices();
}

function markSchedulesAsRead(scheduleIds) {
  let updated = false;

  scheduleIds.forEach((scheduleId) => {
    if (!state.readScheduleIds.has(scheduleId)) {
      state.readScheduleIds.add(scheduleId);
      updated = true;
    }
  });

  if (!updated) {
    return;
  }

  saveReadScheduleIds(state.readScheduleIds);
  renderStatus();
}

function togglePinnedNotice(noticeId) {
  if (state.pinnedNoticeIds.includes(noticeId)) {
    state.pinnedNoticeIds = state.pinnedNoticeIds.filter((id) => id !== noticeId);
  } else {
    state.pinnedNoticeIds = [noticeId, ...state.pinnedNoticeIds];
  }

  savePinnedNoticeIds(state.pinnedNoticeIds);
  renderPanels();
  renderNotices();
}

function getVisibleNoticeGroups() {
  const notices = getSortedNotices().filter((notice) => {
    const sourcePass = getNoticeSource(notice) === state.activeNoticeSource;
    const queryPass =
      state.noticeQuery.length === 0
        ? true
        : normalizeText(`${notice.title} ${notice.body}`).includes(
            normalizeText(state.noticeQuery)
          );

    return sourcePass && queryPass;
  });

  const groups = new Map();

  notices.forEach((notice) => {
    const monthKey = getYearMonthKey(notice.publishedAt);
    const key = getNoticeGroupKey(notice);
    if (!groups.has(key)) {
      groups.set(key, {
        key,
        label: formatMonthFromKey(monthKey),
        notices: [],
      });
    }

    groups.get(key).notices.push(notice);
  });

  return [...groups.values()];
}

function expandVisibleNoticeMonths() {
  getVisibleNoticeGroups().forEach((group) => {
    state.openNoticeMonths.add(group.key);
  });
}

function getUnreadNotices() {
  return getSortedNotices().filter((notice) => !state.readNoticeIds.has(notice.id));
}

function getUnreadSchedules() {
  return [...getAllSchedules()]
    .filter((schedule) => !state.readScheduleIds.has(schedule.id))
    .sort(compareSchedules);
}

function getSortedNotices() {
  return [...appData.notices].sort(
    (left, right) => parseDateTime(right.publishedAt) - parseDateTime(left.publishedAt)
  );
}

function getPinnedNotices() {
  return state.pinnedNoticeIds
    .map((noticeId) => appData.notices.find((notice) => notice.id === noticeId))
    .filter(Boolean);
}

function getBaseScheduleById(scheduleId) {
  return appData.schedules.find((schedule) => schedule.id === scheduleId) || null;
}

function getBaseRecurringRuleById(ruleId) {
  return (appData.recurringScheduleRules || []).find((rule) => rule.id === ruleId) || null;
}

function getAllSchedules() {
  return appData.schedules
    .filter((schedule) => !state.deletedScheduleIds.has(schedule.id))
    .map((schedule) => {
      const override = state.scheduleOverrides[schedule.id];
      return override ? { ...schedule, ...override } : schedule;
    });
}

function getActiveRecurringRules() {
  return (appData.recurringScheduleRules || [])
    .filter((rule) => !state.deletedRecurringRuleIds.has(rule.id))
    .map((rule) => {
      const override = state.recurringRuleOverrides[rule.id];
      return override ? { ...rule, ...override } : rule;
    });
}

function getRecurringRuleById(ruleId) {
  return getActiveRecurringRules().find((rule) => rule.id === ruleId) || null;
}

function getScheduleById(scheduleId, dateKey = null) {
  const fixedSchedule =
    getAllSchedules().find((schedule) => schedule.id === scheduleId) || null;
  if (fixedSchedule || !dateKey) {
    return fixedSchedule;
  }

  return (
    getRecurringSchedulesForDate(dateKey).find(
      (schedule) => schedule.id === scheduleId || schedule.recurringRuleId === scheduleId
    ) || null
  );
}

function getSchedulesForDate(dateKey) {
  return [
    ...getAllSchedules().filter((schedule) => isScheduleOnDate(schedule, dateKey)),
    ...getRecurringSchedulesForDate(dateKey),
  ]
    .sort(compareSchedules);
}

function getSchedulesForMonth(monthDate) {
  const firstDay = new Date(monthDate.getFullYear(), monthDate.getMonth(), 1);
  const lastDay = new Date(monthDate.getFullYear(), monthDate.getMonth() + 1, 0);
  const firstDateKey = toDateKey(firstDay);
  const lastDateKey = toDateKey(lastDay);
  const recurringSchedules = [];

  for (let date = new Date(firstDay); date <= lastDay; date = addDays(date, 1)) {
    recurringSchedules.push(...getRecurringSchedulesForDate(toDateKey(date)));
  }

  return [
    ...getAllSchedules().filter((schedule) =>
      doesScheduleIntersectRange(schedule, firstDateKey, lastDateKey)
    ),
    ...recurringSchedules,
  ].sort(compareSchedules);
}

function isScheduleOnDate(schedule, dateKey) {
  if (!schedule || !schedule.date) {
    return false;
  }

  return schedule.date <= dateKey && getScheduleEndDate(schedule) >= dateKey;
}

function doesScheduleIntersectRange(schedule, startDateKey, endDateKey) {
  if (!schedule || !schedule.date) {
    return false;
  }

  return schedule.date <= endDateKey && getScheduleEndDate(schedule) >= startDateKey;
}

function getScheduleEndDate(schedule) {
  if (schedule && typeof schedule.endDate === "string" && schedule.endDate >= schedule.date) {
    return schedule.endDate;
  }

  return schedule ? schedule.date : "";
}

function hasScheduleDateRange(schedule) {
  return Boolean(schedule && getScheduleEndDate(schedule) > schedule.date);
}

function getRecurringSchedulesForDate(dateKey) {
  const date = parseDateTime(`${dateKey}T00:00`);
  if (date < MIN_CALENDAR_MONTH) {
    return [];
  }

  return getActiveRecurringRules()
    .filter((rule) => shouldShowRecurringSchedule(rule, date, dateKey))
    .map((rule) => {
      let title = rule.title;
      if (rule.baseYear && rule.titleFormat) {
        const diff = date.getFullYear() - rule.baseYear;
        title = rule.titleFormat.replace("%s", rule.title).replace("%d", diff);
      }
      return {
        id: `${rule.id}-${dateKey}`,
        recurringRuleId: rule.id,
        isRecurring: true,
        date: dateKey,
        title: title,
        timeLabel: rule.timeLabel || "",
        description: rule.description || "",
        color: rule.color || "default",
        updatedAt: rule.updatedAt,
        includeInUnread: Boolean(rule.includeInUnread),
        editable: rule.editable !== false,
      };
    });
}

function shouldShowRecurringSchedule(rule, date, dateKey) {
  if (!rule) {
    return false;
  }

  if (rule.startDate && dateKey < rule.startDate) {
    return false;
  }

  if (rule.endDate && dateKey > rule.endDate) {
    return false;
  }

  if (rule.type === "seasonal-setsubun") {
    return shouldShowSetsubunSchedule(date, dateKey);
  }

  if (rule.type === "yearly-interval") {
    return shouldShowYearlyIntervalSchedule(rule, date);
  }

  if (rule.type === "annual-nth-weekday") {
    return shouldShowAnnualNthWeekdaySchedule(rule, date);
  }

  if (rule.type === "monthly-day") {
    return shouldShowMonthlyDaySchedule(rule, date);
  }

  return shouldShowWeeklySchedule(rule, date);
}

function shouldShowWeeklySchedule(rule, date) {
  return typeof rule.weekday === "number" && date.getDay() === rule.weekday;
}

function shouldShowSetsubunSchedule(date, dateKey) {
  return getSetsubunDateKey(date.getFullYear()) === dateKey;
}

function shouldShowYearlyIntervalSchedule(rule, date) {
  if (!rule.startDate) {
    return false;
  }

  const startDate = parseDateTime(`${rule.startDate}T00:00`);
  const intervalYears = Number(rule.intervalYears) || 1;
  const yearDiff = date.getFullYear() - startDate.getFullYear();

  return (
    yearDiff >= 0 &&
    yearDiff % intervalYears === 0 &&
    date.getMonth() === startDate.getMonth() &&
    date.getDate() === startDate.getDate()
  );
}

function shouldShowAnnualNthWeekdaySchedule(rule, date) {
  if (
    !Number.isInteger(rule.month) ||
    !Number.isInteger(rule.weekday) ||
    !Number.isInteger(rule.nth)
  ) {
    return false;
  }

  const month = date.getMonth() + 1;
  if (month !== rule.month || date.getDay() !== rule.weekday) {
    return false;
  }

  const weekdayOccurrence = Math.floor((date.getDate() - 1) / 7) + 1;
  return weekdayOccurrence === rule.nth;
}

function shouldShowMonthlyDaySchedule(rule, date) {
  return Number.isInteger(rule.day) && date.getDate() === rule.day;
}

function getSetsubunDateKey(year) {
  if (SEASONAL_DATE_CACHE.setsubun.has(year)) {
    return SEASONAL_DATE_CACHE.setsubun.get(year);
  }

  const risshunDate = getSeasonalBoundaryDate(year, 315, new Date(year, 1, 2), new Date(year, 1, 5));
  const setsubunDateKey = toDateKey(addDays(risshunDate, -1));
  SEASONAL_DATE_CACHE.setsubun.set(year, setsubunDateKey);
  return setsubunDateKey;
}

function getSeasonalBoundaryDate(year, targetLongitude, rangeStart, rangeEnd) {
  let low = rangeStart.getTime();
  let high = rangeEnd.getTime();

  while (high - low > 60000) {
    const mid = Math.floor((low + high) / 2);
    const longitude = getSolarApparentLongitude(new Date(mid));

    if (longitude >= targetLongitude) {
      high = mid;
    } else {
      low = mid;
    }
  }

  return new Date(high);
}

function getSolarApparentLongitude(date) {
  const julianDay = date.getTime() / 86400000 + 2440587.5;
  const julianCentury = (julianDay - 2451545.0) / 36525;
  const meanLongitude =
    280.46646 + 36000.76983 * julianCentury + 0.0003032 * julianCentury * julianCentury;
  const meanAnomaly =
    357.52911 + 35999.05029 * julianCentury - 0.0001537 * julianCentury * julianCentury;
  const equationOfCenter =
    (1.914602 - 0.004817 * julianCentury - 0.000014 * julianCentury * julianCentury) *
      sinDegrees(meanAnomaly) +
    (0.019993 - 0.000101 * julianCentury) * sinDegrees(2 * meanAnomaly) +
    0.000289 * sinDegrees(3 * meanAnomaly);
  const trueLongitude = meanLongitude + equationOfCenter;
  const omega = 125.04 - 1934.136 * julianCentury;
  return normalizeDegrees(trueLongitude - 0.00569 - 0.00478 * sinDegrees(omega));
}

function sinDegrees(value) {
  return Math.sin((value * Math.PI) / 180);
}

function normalizeDegrees(value) {
  const normalized = value % 360;
  return normalized < 0 ? normalized + 360 : normalized;
}

function buildCalendarCells(monthDate) {
  const year = monthDate.getFullYear();
  const month = monthDate.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const leading = (firstDay.getDay() + 6) % 7;
  const totalDays = lastDay.getDate();
  const cells = [];
  const prevMonthLastDay = new Date(year, month, 0).getDate();
  const todayKey = toDateKey(new Date());

  for (let index = 0; index < leading; index += 1) {
    const day = prevMonthLastDay - leading + index + 1;
    const date = new Date(year, month - 1, day);
    const dateKey = toDateKey(date);
    cells.push({
      date: dateKey,
      dayLabel: String(day),
      isToday: todayKey === dateKey,
      isOutside: true,
      isSaturday: date.getDay() === 6,
      isSunday: date.getDay() === 0,
      isGarbageDay: isGarbageCollectionDay(date),
      isDisabled: date < MIN_CALENDAR_MONTH,
      events: getSchedulesForDate(dateKey),
    });
  }

  for (let day = 1; day <= totalDays; day += 1) {
    const date = new Date(year, month, day);
    const dateKey = toDateKey(date);

    cells.push({
      date: dateKey,
      dayLabel: String(day),
      isToday: todayKey === dateKey,
      isOutside: false,
      isSaturday: date.getDay() === 6,
      isSunday: date.getDay() === 0,
      isGarbageDay: isGarbageCollectionDay(date),
      isDisabled: false,
      events: getSchedulesForDate(dateKey),
    });
  }

  let trailingDay = 1;
  while (cells.length % 7 !== 0) {
    const date = new Date(year, month + 1, trailingDay);
    const dateKey = toDateKey(date);
    cells.push({
      date: dateKey,
      dayLabel: String(trailingDay),
      isToday: todayKey === dateKey,
      isOutside: true,
      isSaturday: date.getDay() === 6,
      isSunday: date.getDay() === 0,
      isGarbageDay: isGarbageCollectionDay(date),
      isDisabled: false,
      events: getSchedulesForDate(dateKey),
    });
    trailingDay += 1;
  }

  return cells;
}

function buildMonthCalendarCells(monthDate) {
  const cells = buildCalendarCells(monthDate);
  const dateIndex = new Map(cells.map((cell, index) => [cell.date, index]));
  const firstVisibleDate = cells[0]?.date || "";
  const lastVisibleDate = cells[cells.length - 1]?.date || "";
  const consumedOccurrences = new Set();
  const rangeEntries = [];
  const processedRangeIds = new Set();

  cells.forEach((cell) => {
    cell.visibleEvents = [...cell.events];
    cell.rangeSegments = [];
    cell.rangeLaneCount = 0;
  });

  cells.forEach((cell) => {
    cell.events.forEach((schedule) => {
      const occurrenceId = getScheduleOccurrenceId(schedule, cell.date);
      if (consumedOccurrences.has(occurrenceId) || !isMonthRangeDisplayCandidate(schedule)) {
        return;
      }

      if (hasScheduleDateRange(schedule)) {
        const rangeStart = getMaxDateKey(schedule.date, firstVisibleDate);
        if (cell.date !== rangeStart || processedRangeIds.has(schedule.id)) {
          return;
        }

        const rangeEnd = getMinDateKey(getScheduleEndDate(schedule), lastVisibleDate);
        if (rangeStart === rangeEnd) {
          return;
        }

        processedRangeIds.add(schedule.id);
        getDateKeySequence(rangeStart, rangeEnd).forEach((dateKey) => {
          consumedOccurrences.add(getScheduleOccurrenceId(schedule, dateKey));
        });
        rangeEntries.push({
          schedule,
          startDate: rangeStart,
          endDate: rangeEnd,
        });
        return;
      }

      const signature = getMonthAutoRangeSignature(schedule);
      if (!signature) {
        return;
      }

      let cursorDate = cell.date;
      let endDate = cell.date;
      const matchedOccurrences = [occurrenceId];

      while (true) {
        const nextDate = toDateKey(addDays(parseDateTime(`${cursorDate}T00:00`), 1));
        if (!dateIndex.has(nextDate)) {
          break;
        }

        const nextCell = cells[dateIndex.get(nextDate)];
        const match = nextCell.events.find((candidate) => {
          const candidateOccurrenceId = getScheduleOccurrenceId(candidate, nextDate);
          return (
            !consumedOccurrences.has(candidateOccurrenceId) &&
            !hasScheduleDateRange(candidate) &&
            getMonthAutoRangeSignature(candidate) === signature
          );
        });

        if (!match) {
          break;
        }

        endDate = nextDate;
        matchedOccurrences.push(getScheduleOccurrenceId(match, nextDate));
        cursorDate = nextDate;
      }

      if (endDate === cell.date) {
        return;
      }

      matchedOccurrences.forEach((matchedOccurrenceId) => {
        consumedOccurrences.add(matchedOccurrenceId);
      });
      rangeEntries.push({
        schedule,
        startDate: cell.date,
        endDate,
      });
    });
  });

  cells.forEach((cell) => {
    cell.visibleEvents = cell.events.filter(
      (schedule) => !consumedOccurrences.has(getScheduleOccurrenceId(schedule, cell.date))
    );
  });

  assignMonthRangeSegments(cells, rangeEntries);
  return cells;
}

function assignMonthRangeSegments(cells, rangeEntries) {
  for (let rowStartIndex = 0; rowStartIndex < cells.length; rowStartIndex += 7) {
    const rowCells = cells.slice(rowStartIndex, rowStartIndex + 7);
    if (rowCells.length === 0) {
      continue;
    }

    const weekStart = rowCells[0].date;
    const weekEnd = rowCells[rowCells.length - 1].date;
    const laneEnds = [];
    const rowRanges = rangeEntries
      .filter((entry) => entry.startDate <= weekEnd && entry.endDate >= weekStart)
      .map((entry) => ({
        ...entry,
        segmentStart: getMaxDateKey(entry.startDate, weekStart),
        segmentEnd: getMinDateKey(entry.endDate, weekEnd),
      }))
      .sort((left, right) => {
        const leftStart = getDateDistanceInDays(weekStart, left.segmentStart);
        const rightStart = getDateDistanceInDays(weekStart, right.segmentStart);
        if (leftStart !== rightStart) {
          return leftStart - rightStart;
        }

        const leftEnd = getDateDistanceInDays(weekStart, left.segmentEnd);
        const rightEnd = getDateDistanceInDays(weekStart, right.segmentEnd);
        if (leftEnd !== rightEnd) {
          return rightEnd - leftEnd;
        }

        return left.schedule.title.localeCompare(right.schedule.title, "ja");
      });

    rowRanges.forEach((entry) => {
      const startCol = getDateDistanceInDays(weekStart, entry.segmentStart);
      const endCol = getDateDistanceInDays(weekStart, entry.segmentEnd);
      let lane = 0;

      while (laneEnds[lane] !== undefined && laneEnds[lane] >= startCol) {
        lane += 1;
      }

      laneEnds[lane] = endCol;

      for (let col = startCol; col <= endCol; col += 1) {
        rowCells[col].rangeSegments.push({
          lane,
          schedule: entry.schedule,
          isActualStart: col === startCol && entry.segmentStart === entry.startDate,
          isActualEnd: col === endCol && entry.segmentEnd === entry.endDate,
          showLabel: col === startCol,
        });
      }
    });

    const laneCount = laneEnds.length;
    rowCells.forEach((cell) => {
      cell.rangeLaneCount = laneCount;
      cell.rangeSegments.sort(
        (left, right) =>
          left.lane - right.lane ||
          left.schedule.title.localeCompare(right.schedule.title, "ja")
      );
    });
  }
}

function isMonthRangeDisplayCandidate(schedule) {
  return Boolean(schedule && !hasScheduleTimeRange(schedule));
}

function getMonthAutoRangeSignature(schedule) {
  if (!isMonthRangeDisplayCandidate(schedule) || hasScheduleDateRange(schedule)) {
    return "";
  }

  return JSON.stringify({

    description: normalizeText(schedule.description || ""),
    timeLabel: getScheduleTimeLabel(schedule, ""),
    color: getScheduleColorTone(schedule),
  });
}

function getScheduleOccurrenceId(schedule, dateKey) {

function getDateKeySequence(startDateKey, endDateKey) {
  const dates = [];
  for (
    let cursor = parseDateTime(`${startDateKey}T00:00`);
    toDateKey(cursor) <= endDateKey;
    cursor = addDays(cursor, 1)
  ) {
    dates.push(toDateKey(cursor));
  }
  return dates;
}

function getDateDistanceInDays(startDateKey, endDateKey) {
  const startDate = parseDateTime(`${startDateKey}T00:00`);
  const endDate = parseDateTime(`${endDateKey}T00:00`);
  return Math.round((endDate - startDate) / 86400000);
}

function getMinDateKey(left, right) {

}

function getMaxDateKey(left, right) {

function createInitialOpenMonths() {

function getLastUpdatedAt() {

}

function createEmptyCard(title, text) {
  const card = document.createElement("article");
  card.className = "empty-card";

  const descriptionMarkup = text
    ? `<p class="empty-text">${escapeHtml(text)}</p>`
    : "";

  card.innerHTML = `
    <h3 class="section-title">${escapeHtml(title)}</h3>
    ${descriptionMarkup}
  `;
  return card;
}

function getSnippet(text, maxLength) {
  const normalized = text.replace(/\s+/g, " ").trim();
  if (normalized.length <= maxLength) {
    return normalized;
  }

  return `${normalized.slice(0, maxLength).trim()}…`;
}

function getNoticePreviewText(text, query, maxLength) {
  const normalized = text.replace(/\s+/g, " ").trim();
  if (!query) {
    return getSnippet(normalized, maxLength);
  }

  const keyword = query.trim().toLowerCase();
  const index = normalized.toLowerCase().indexOf(keyword);

  if (index < 0 || normalized.length <= maxLength) {
    return getSnippet(normalized, maxLength);
  }

  const start = Math.max(0, index - 18);
  const end = Math.min(normalized.length, start + maxLength);
  const prefix = start > 0 ? "…" : "";
  const suffix = end < normalized.length ? "…" : "";
  return `${prefix}${normalized.slice(start, end).trim()}${suffix}`;
}

function createUnreadSection(title, items, onOpen, mapItem, onMarkAllRead) {
  const section = document.createElement("section");
  section.className = "unread-section";

  const header = document.createElement("div");
  header.className = "unread-section__header";
  header.innerHTML = `
    <h4 class="unread-section__title">${escapeHtml(title)}</h4>
    <div class="unread-section__controls">
      <button
        type="button"
        class="unread-bulk-read pressable"
        ${items.length === 0 ? "disabled" : ""}
      >
        一括既読
      </button>
      <span class="unread-count ${items.length > 0 ? "unread-count--active" : "unread-count--zero"}">
        ${items.length}件
      </span>
    </div>
  `;
  section.appendChild(header);

  const bulkReadButton = header.querySelector(".unread-bulk-read");
  if (bulkReadButton && onMarkAllRead && items.length > 0) {
    bulkReadButton.addEventListener("click", onMarkAllRead);
  }

  if (items.length === 0) {
    const empty = document.createElement("p");
    empty.className = "empty-text";
    empty.textContent = "現在はありません。";
    section.appendChild(empty);
    return section;
  }

  const list = document.createElement("div");
  list.className = "unread-list";

  items.forEach((item) => {
    const detail = mapItem(item);
    const button = document.createElement("button");
    button.type = "button";
    const summaryMarkup = detail.summary
      ? `<span class="unread-item__summary">${escapeHtml(detail.summary)}</span>`
      : "";
    button.className = "unread-item pressable";
    button.innerHTML = `
      <span class="unread-item__meta">${escapeHtml(detail.meta)}</span>
      <strong class="unread-item__title">${escapeHtml(detail.title)}</strong>
      ${summaryMarkup}
    `;
    button.addEventListener("click", () => onOpen(item));
    list.appendChild(button);
  });

  section.appendChild(list);
  return section;
}

function escapeHtml(value) {
  return value
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function highlightText(text, query) {
  if (!query) {
    return escapeHtml(text);
  }

  const escaped = escapeHtml(text);
  const safeQuery = escapeRegExp(query.trim());
  if (!safeQuery) {
    return escaped;
  }

  const matcher = new RegExp(`(${safeQuery})`, "gi");
  return escaped.replace(matcher, '<mark class="mark-text">$1</mark>');
}

function escapeRegExp(value) {
  return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function normalizeText(value) {
  return value.toLowerCase().normalize("NFKC");
}

function parseDateTime(value) {
  const [datePart, timePart = "00:00"] = value.split("T");
  const [year, month, day] = datePart.split("-").map(Number);
  const [hour, minute] = timePart.split(":").map(Number);
  return new Date(year, month - 1, day, hour, minute);
}

function formatDateTime(value) {
  const date = parseDateTime(value);
  return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 ${String(
    date.getHours()
  ).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
}

function formatDateHeadline(dateKey) {
  const date = parseDateTime(`${dateKey}T00:00`);
  const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
  return `${date.getMonth() + 1}月${date.getDate()}日（${weekdays[date.getDay()]}）`;
}

function formatMonthHeadline(date) {
  return `${date.getFullYear()}年${date.getMonth() + 1}月`;
}

function formatWeekHeadline(dateKey) {
  const selectedDate = parseDateTime(`${dateKey}T00:00`);
  const weekStart = getStartOfWeek(selectedDate);
  const weekEnd = addDays(weekStart, 6);
  return `${weekStart.getMonth() + 1}月${weekStart.getDate()}日 - ${weekEnd.getMonth() + 1}月${weekEnd.getDate()}日`;
}

function formatMonthFromKey(monthKey) {
  const [year, month] = monthKey.split("-").map(Number);
  return `${year}年${month}月`;
}

function formatWeekdayShort(date) {
  return ["月", "火", "水", "木", "金", "土", "日"][(date.getDay() + 6) % 7];
}

function getYearMonthKey(value) {
  const date = parseDateTime(value);
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
}

function getStartOfMonth(date) {
  return new Date(date.getFullYear(), date.getMonth(), 1);
}

function getStartOfWeek(date) {
  const start = new Date(date);
  const diff = (date.getDay() + 6) % 7;
  start.setDate(date.getDate() - diff);
  start.setHours(0, 0, 0, 0);
  return start;
}

function buildWeekDates(dateKey) {
  const start = getStartOfWeek(parseDateTime(`${dateKey}T00:00`));
  return Array.from({ length: 7 }, (_, index) => addDays(start, index));
}

function clampMonth(date) {
  const monthDate = getStartOfMonth(date);
  if (monthDate < MIN_CALENDAR_MONTH) {
    return new Date(MIN_CALENDAR_MONTH);
  }

  return monthDate;
}

function isMinCalendarMonth(date) {
  return getStartOfMonth(date).getTime() === MIN_CALENDAR_MONTH.getTime();
}

function isMinCalendarWeek(dateKey) {
  const weekStart = getStartOfWeek(parseDateTime(`${dateKey}T00:00`));
  return weekStart.getTime() <= getStartOfWeek(MIN_CALENDAR_MONTH).getTime();
}

function ensureSelectedDate() {
  if (!state.selectedDate) {
    state.selectedDate = toDateKey(getInitialCalendarDate());
  }

  const selectedDate = parseDateTime(`${state.selectedDate}T00:00`);
  if (selectedDate < MIN_CALENDAR_MONTH) {
    state.selectedDate = toDateKey(MIN_CALENDAR_MONTH);
  }

  return state.selectedDate;
}

function getInitialCalendarDate() {
  const today = new Date();
  return today < MIN_CALENDAR_MONTH ? new Date(MIN_CALENDAR_MONTH) : today;
}

function toDateKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(
    date.getDate()
  ).padStart(2, "0")}`;
}

function addDays(date, amount) {
  const next = new Date(date);
  next.setDate(next.getDate() + amount);
  return next;
}

function isGarbageCollectionDay(date) {
  const weekday = date.getDay();
  return weekday === 1 || weekday === 4;
}

function hasScheduleTimeRange(schedule) {
  return isValidTime(schedule.start) && isValidTime(schedule.end);
}

function isValidTime(value) {
  return typeof value === "string" && /^\d{2}:\d{2}$/.test(value);
}

function getScheduleTimeLabel(schedule, fallback = "") {
  if (hasScheduleTimeRange(schedule)) {
    return `${schedule.start}〜${schedule.end}`;
  }

  const timeLabel = typeof schedule.timeLabel === "string" ? schedule.timeLabel.trim() : "";
  if (timeLabel && !isUnknownTimeLabel(timeLabel)) {
    return timeLabel;
  }

  return fallback;
}

function isUnknownTimeLabel(value) {
  const normalized = normalizeText(value).replace(/\s+/g, "");
  return normalized === "時間未定" || normalized === "未定";
}

function formatScheduleSummaryLine(schedule) {
  const timeLabel = getScheduleTimeLabel(schedule, "");
  return timeLabel ? `${timeLabel} ${schedule.title}` : schedule.title;
}

function formatUnreadScheduleMeta(schedule) {
  const timeLabel = getScheduleTimeLabel(schedule, "");
  return timeLabel
    ? `${formatDateHeadline(schedule.date)} / ${timeLabel}`
    : formatDateHeadline(schedule.date);
}

function getScheduleDescription(schedule) {
  const description =
    typeof schedule.description === "string" ? schedule.description.trim() : "";
  const title = typeof schedule.title === "string" ? schedule.title.trim() : "";

  if (!description) {
    return "";
  }

  if (!title) {
    return description;
  }

  const normalizedTitle = normalizeComparableText(title);
  const normalizedDescription = normalizeComparableText(description);

  if (!normalizedDescription || normalizedDescription === normalizedTitle) {
    return "";
  }

  const titlePattern = escapeRegExp(title);
  const cleaned = description
    .replace(new RegExp(`^${titlePattern}(?:の予定)?[。．、,：:・\\s]*`, "u"), "")
    .trim();

  if (!cleaned) {
    return "";
  }

  return normalizeComparableText(cleaned) === normalizedTitle ? "" : cleaned;
}

function isRecurringSchedule(schedule) {
  return Boolean(schedule && schedule.isRecurring);
}

function createScheduleDescriptionContent(description) {
  if (!description) {
    return null;
  }

  const lines = description
    .split(/\n+/)
    .map((line) => line.trim())
    .filter(Boolean);

  if (lines.length <= 1) {
    const paragraph = document.createElement("p");
    paragraph.className = "calendar-event__description";
    paragraph.textContent = description;
    return paragraph;
  }

  const wrapper = document.createElement("div");
  wrapper.className = "calendar-event__description-block";
  let currentList = null;

  lines.forEach((line) => {
    const bullet = line.match(/^[・●\-]\s*(.+)$/u);
    if (bullet) {
      if (!currentList) {
        currentList = document.createElement("ul");
        currentList.className = "calendar-event__description-list";
        wrapper.appendChild(currentList);
      }

      const item = document.createElement("li");
      item.className = "calendar-event__description-item";
      item.textContent = bullet[1].trim();
      currentList.appendChild(item);
      return;
    }

    currentList = null;
    const paragraph = document.createElement("p");
    paragraph.className = /^(出演グループ|出演者|グループ一覧)$/u.test(line)
      ? "calendar-event__description calendar-event__description--heading"
      : "calendar-event__description";
    paragraph.textContent = line;
    wrapper.appendChild(paragraph);
  });

  return wrapper;
}

function isValidScheduleColor(value) {
  return SCHEDULE_COLOR_ORDER.includes(value);
}

function getScheduleColorTone(schedule) {
  if (schedule && isValidScheduleColor(schedule.color)) {
    return schedule.color;
  }

  return "default";
}

function getScheduleColorLabel(schedule) {
  return SCHEDULE_COLOR_LABELS[getScheduleColorTone(schedule)] || SCHEDULE_COLOR_LABELS.default;
}

function getNextScheduleColor(currentColor) {
  const index = SCHEDULE_COLOR_ORDER.indexOf(currentColor);
  if (index < 0) {
    return SCHEDULE_COLOR_ORDER[0];
  }

  return SCHEDULE_COLOR_ORDER[(index + 1) % SCHEDULE_COLOR_ORDER.length];
}

function saveSchedulePatch(scheduleId, patch, dateKey = null) {
  const currentSchedule = getScheduleById(scheduleId, dateKey);
  if (isRecurringSchedule(currentSchedule)) {
    saveRecurringRulePatch(currentSchedule.recurringRuleId, patch);
    return;
  }

  const baseSchedule = getBaseScheduleById(scheduleId);

  if (!baseSchedule || !currentSchedule) {
    return;
  }

  const nextTitle =
    patch.title !== undefined ? patch.title.trim() : currentSchedule.title;
  const nextDescription =
    patch.description !== undefined
      ? patch.description.trim()
      : currentSchedule.description || "";
  const nextColorRaw =
    patch.color !== undefined ? patch.color : getScheduleColorTone(currentSchedule);
  const nextColor = isValidScheduleColor(nextColorRaw) ? nextColorRaw : "default";

  const override = {};
  if (nextTitle !== baseSchedule.title) {
    override.title = nextTitle;
  }

  if (nextDescription !== (baseSchedule.description || "")) {
    override.description = nextDescription;
  }

  if (getScheduleColorTone(baseSchedule) !== nextColor) {
    override.color = nextColor;
  }

  if (Object.keys(override).length > 0) {
    override.updatedAt = toDateTimeKey(new Date());
    state.scheduleOverrides[scheduleId] = override;
  } else {
    delete state.scheduleOverrides[scheduleId];
  }

  saveScheduleOverrides(state.scheduleOverrides);
  render();
}

function cycleScheduleColor(scheduleId, dateKey, options = {}) {
  const schedule = getScheduleById(scheduleId, dateKey);
  if (!schedule) {
    return;
  }

  saveSchedulePatch(
    scheduleId,
    {
      color: getNextScheduleColor(getScheduleColorTone(schedule)),
    },
    dateKey
  );
  openScheduleDetail(dateKey, options);
}

function saveRecurringRulePatch(ruleId, patch) {
  const baseRule = getBaseRecurringRuleById(ruleId);
  const currentRule = getRecurringRuleById(ruleId);

  if (!baseRule || !currentRule) {
    return;
  }

  const nextTitle =
    patch.title !== undefined ? patch.title.trim() : currentRule.title;
  const nextDescription =
    patch.description !== undefined
      ? patch.description.trim()
      : currentRule.description || "";
  const nextColorRaw =
    patch.color !== undefined ? patch.color : getScheduleColorTone(currentRule);
  const nextColor = isValidScheduleColor(nextColorRaw) ? nextColorRaw : "default";

  const override = {};
  if (nextTitle !== baseRule.title) {
    override.title = nextTitle;
  }

  if (nextDescription !== (baseRule.description || "")) {
    override.description = nextDescription;
  }

  if (getScheduleColorTone(baseRule) !== nextColor) {
    override.color = nextColor;
  }

  if (Object.keys(override).length > 0) {
    override.updatedAt = toDateTimeKey(new Date());
    state.recurringRuleOverrides[ruleId] = override;
  } else {
    delete state.recurringRuleOverrides[ruleId];
  }

  saveRecurringRuleOverrides(state.recurringRuleOverrides);
  render();
}

function deleteSchedule(scheduleId, dateKey = null) {
  const schedule = getScheduleById(scheduleId, dateKey);
  if (isRecurringSchedule(schedule)) {
    deleteRecurringRule(schedule.recurringRuleId, dateKey);
    return;
  }

  if (!getBaseScheduleById(scheduleId)) {
    return;
  }

  state.deletedScheduleIds.add(scheduleId);
  delete state.scheduleOverrides[scheduleId];
  state.readScheduleIds.delete(scheduleId);
  saveDeletedScheduleIds(state.deletedScheduleIds);
  saveScheduleOverrides(state.scheduleOverrides);
  saveReadScheduleIds(state.readScheduleIds);
  render();
}

function deleteRecurringRule(ruleId, dateKey) {
  if (!getBaseRecurringRuleById(ruleId)) {
    return;
  }

  // 繰り返し予定を一掃するのではなく、削除操作を行った日（dateKey）を終了日として保存します。
  // これにより、削除した日までの過去分は残り、翌日以降の分だけが非表示になります。
  const override = state.recurringRuleOverrides[ruleId] || {};
  override.endDate = dateKey;
  override.updatedAt = toDateTimeKey(new Date());
  state.recurringRuleOverrides[ruleId] = override;

  saveRecurringRuleOverrides(state.recurringRuleOverrides);
  render();
}

function normalizeComparableText(value) {
  return normalizeText(value)
    .replace(/[。．、,：:・「」『』（）()!?！？\s]/g, "")
    .replace(/の予定$/u, "");
}

function compareSchedules(left, right) {
  const dateCompare = left.date.localeCompare(right.date);
  if (dateCompare !== 0) {
    return dateCompare;
  }

  const leftTimed = hasScheduleTimeRange(left);
  const rightTimed = hasScheduleTimeRange(right);

  if (leftTimed && rightTimed) {
    return parseTimeToMinutes(left.start) - parseTimeToMinutes(right.start);
  }

  if (leftTimed) {
    return -1;
  }

  if (rightTimed) {
    return 1;
  }

  const leftLabel = getScheduleTimeLabel(left, "");
  const rightLabel = getScheduleTimeLabel(right, "");
  if (leftLabel !== rightLabel) {
    return leftLabel.localeCompare(rightLabel, "ja");
  }

  return left.title.localeCompare(right.title, "ja");
}

function toDateTimeKey(date) {
  return `${toDateKey(date)}T${String(date.getHours()).padStart(2, "0")}:${String(
    date.getMinutes()
  ).padStart(2, "0")}`;
}

function parseTimeToMinutes(value) {
  const [hour, minute] = value.split(":").map(Number);
  return hour * 60 + minute;
}
